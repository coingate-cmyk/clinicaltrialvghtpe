name: Deploy v4.10 Firebase Save Hotfix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/vendorize.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply verified Firebase save hotfix
        shell: bash
        env:
          RELEASE_PATCH: 
        run: |
          set -euo pipefail
          node -e "const fs=require('fs'),z=require('zlib');fs.writeFileSync('release.patch',z.brotliDecompressSync(Buffer.from(process.env.RELEASE_PATCH,'base64')))"
          git apply --check release.patch
          git apply release.patch
          cp index.html 404.html
          grep -q 'resolveFirebaseConfig' index.html
          cmp index.html 404.html
      - name: Verify JavaScript syntax
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const html = fs.readFileSync('index.html', 'utf8');
          const scripts = [...html.matchAll(/<script(?:\s[^>]*)?>([\s\S]*?)<\/script>/gi)]
            .map(match => match[1])
            .filter(script => script.trim());
          scripts.forEach((script, index) => new vm.Script(script, { filename: `inline-${index}.js` }));
          console.log(`JavaScript syntax OK (${scripts.length} inline script)`);
          NODE
      - name: Commit hotfix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html 404.html
          git commit -m 'Fix Firebase save configuration and progress fields'
          git push
