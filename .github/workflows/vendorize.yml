name: Deploy v4.10 Realtime Database

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/vendorize.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply verified v4.10 release
        shell: bash
        env:
          RELEASE_PATCH: 
        run: |
          set -euo pipefail
          if grep -q 'v4.10 Realtime Database版' index.html; then
            echo 'v4.10 is already deployed.'
            exit 0
          fi
          node -e "const fs=require('fs'),z=require('zlib');fs.writeFileSync('release.patch',z.brotliDecompressSync(Buffer.from(process.env.RELEASE_PATCH,'base64')))"
          git apply release.patch
          cp index.html 404.html
          grep -q 'v4.10 Realtime Database版' index.html
          cmp index.html 404.html
      - name: Commit release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html 404.html
          if git diff --cached --quiet; then
            echo 'No release changes to commit.'
          else
            git commit -m 'Deploy v4.10 Realtime Database release'
            git push
          fi
