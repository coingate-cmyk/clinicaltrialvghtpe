name: Trigger v4.10 deployment

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Start v4.10 deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run vendorize.yml --repo "${{ github.repository }}" --ref main
