<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>臨床試驗管理系統 v3 (Realtime DB)</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f5f7fb; }
    header { background:#1e40af; color:#fff; padding:16px; }
    .container { max-width:1000px; margin:20px auto; padding:16px; background:#fff; border-radius:8px; }
    input, button { padding:8px; margin:4px; }
    button { cursor:pointer; background:#2563eb; color:#fff; border:none; border-radius:4px; }
    table { width:100%; border-collapse: collapse; margin-top:12px; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#f1f5f9; }
  </style>
</head>
<body>
<header>
  <h2>臨床試驗管理系統 v3（Realtime DB版）</h2>
</header>

<div class="container">
  <h3>登入</h3>
  <input id="pwd" type="password" placeholder="輸入密碼"/>
  <button onclick="login()">登入</button>

  <div id="app" style="display:none;">
    <h3>新增試驗</h3>
    <input id="title" placeholder="試驗名稱"/>
    <input id="pi" placeholder="PI"/>
    <button onclick="addTrial()">新增</button>

    <h3>試驗列表</h3>
    <table>
      <thead>
        <tr><th>名稱</th><th>PI</th></tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const PASSWORD = "clinical2026";

function login(){
  const p = document.getElementById("pwd").value;
  if(p === PASSWORD){
    document.getElementById("app").style.display = "block";
  } else {
    alert("密碼錯誤");
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyDQREDbVoc6QpcKitiU5JN5gWk4JHKE1Og",
  authDomain: "clinicaltrial-vghtpe.firebaseapp.com",
  databaseURL: "https://clinicaltrial-vghtpe-default-rtdb.firebaseio.com/",
  projectId: "clinicaltrial-vghtpe",
  storageBucket: "clinicaltrial-vghtpe.firebasestorage.app",
  messagingSenderId: "220821651319",
  appId: "1:220821651319:web:19dbfbaea0ea999472eb72"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("clinicalTrialApp/trials").on("value", snapshot => {
  const data = snapshot.val() || {};
  const list = document.getElementById("list");
  list.innerHTML = "";
  Object.values(data).forEach(t => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${t.title}</td><td>${t.pi}</td>`;
    list.appendChild(tr);
  });
});

function addTrial(){
  const title = document.getElementById("title").value;
  const pi = document.getElementById("pi").value;

  if(!title) return alert("請輸入試驗名稱");

  const id = Date.now();
  db.ref("clinicalTrialApp/trials/" + id).set({
    title,
    pi,
    createdAt: new Date().toISOString()
  });
}
</script>
</body>
</html>
