<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試版本</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const e = React.createElement;
        
        function TestApp() {
            return e('div', {className: 'max-w-4xl mx-auto'},
                e('h1', {className: 'text-3xl font-bold mb-4'}, '測試頁面'),
                e('div', {className: 'bg-blue-100 p-4 rounded'},
                    e('p', null, '如果您看到這段文字，表示 React 正常運作'),
                    e('p', {className: 'mt-2'}, '中文顯示正常')
                ),
                e('div', {className: 'mt-4 flex gap-3'},
                    e('button', {
                        className: 'px-4 py-2 bg-blue-500 text-white rounded',
                        onClick: () => alert('按鈕功能正常')
                    }, '測試按鈕')
                )
            );
        }
        
        ReactDOM.render(e(TestApp), document.getElementById('app'));
    </script>
</body>
</html>
