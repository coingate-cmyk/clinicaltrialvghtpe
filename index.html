const getDb = () => {
    try {
        if (__db) return __db;
        if (!firebase.apps.length) {
            firebase.initializeApp(FIREBASE_CONFIG);
        }
        __db = firebase.database();

    } catch (error) {
        console.error('Firebase init error:', error);
        return null;
    }
};

const getRootRef = () => {
    const db = getDb();
    return db ? db.ref(RTDB_PATH.root) : null;
};

const saveAllData = async (trialsData, subjectsData) => {
    const encryptedTrials = encryptData(trialsData || []);
    const encryptedSubjects = encryptData(subjectsData || []);
    if (encryptedTrials) localStorage.setItem('clinical-trials-encrypted', encryptedTrials);
    if (encryptedSubjects) localStorage.setItem('clinical-trials-subjects', encryptedSubjects);

    const rootRef = getRootRef();
    if (!rootRef) return false;

    await rootRef.set({
        trials: encryptedTrials,
        subjects: encryptedSubjects,
        updatedAt: new Date().toISOString()
    });
    return true;
};

const loadRemoteDataOnce = async () => {
    const rootRef = getRootRef();
    if (!rootRef) return null;
    const snapshot = await rootRef.once('value');
    return snapshot.val();
};


const encryptData = (data) => {
    try {
        return CryptoJS.AES.encrypt(JSON.stringify(data), CONFIG.ENCRYPTION_KEY).toString();
    } catch (error) {
        return null;
    }
};

const decryptData = (encrypted) => {
    try {
        const bytes = CryptoJS.AES.decrypt(encrypted, CONFIG.ENCRYPTION_KEY);
        return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
    } catch (error) {
        return null;
    }
};

const normalizeCode = (v) => String(v || '').trim().toUpperCase();
const normalizeText = (v) => String(v || '').replace(/\s+/g, ' ').trim();

const upsertTrialsByCode = (existingTrials, incomingTrials) => {
    const map = new Map();

    (existingTrials || []).forEach((trial) => {
        const key = normalizeCode(trial.code);
        if (key) map.set(key, { ...trial });
    });

    (incomingTrials || []).forEach((incoming) => {
        const key = normalizeCode(incoming.code);
        if (!key) return;

        const prev = map.get(key) || {};
        const merged = {
            ...prev,
            ...incoming,
            id: prev.id || incoming.id || Date.now() + Math.floor(Math.random() * 1000),
            code: key,
            studyTitle: normalizeText(incoming.studyTitle || prev.studyTitle),
            sponsor: normalizeText(incoming.sponsor || prev.sponsor),
            pi: normalizeText(incoming.pi || prev.pi),
            nurse: normalizeText(incoming.nurse || prev.nurse),
            phone: normalizeText(incoming.phone || prev.phone),
            comments: normalizeText(incoming.comments || prev.comments),
            inclusion: String(incoming.inclusion || prev.inclusion || ''),
            exclusion: String(incoming.exclusion || prev.exclusion || ''),
            targetNum: Number.isFinite(Number(incoming.targetNum)) ? Number(incoming.targetNum) : (prev.targetNum || 0),
            enrolled: Number.isFinite(Number(incoming.enrolled)) ? Number(incoming.enrolled) : (prev.enrolled || 0),
            monthSigned: Number.isFinite(Number(incoming.monthSigned)) ? Number(incoming.monthSigned) : (prev.monthSigned || 0),
            monthEnrolled: Number.isFinite(Number(incoming.monthEnrolled)) ? Number(incoming.monthEnrolled) : (prev.monthEnrolled || 0),
        };

        if (!Array.isArray(merged.cancerTypes) || merged.cancerTypes.length === 0) {
            merged.cancerTypes = Array.isArray(prev.cancerTypes) ? prev.cancerTypes : [];
        }

        map.set(key, merged);
    });

    return Array.from(map.values()).sort((a, b) => normalizeCode(a.code).localeCompare(normalizeCode(b.code)));
};

const parseCsvLine = (line) => {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];
        if (ch === '"') {
            if (inQuotes && next === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (ch === ',' && !inQuotes) {
            result.push(current);
            current = '';
        } else {
            current += ch;
        }
    }
    result.push(current);
    return result.map(v => v.trim());
};


const renderStructuredText = (text, baseClass='text-gray-700') => {
    const lines = String(text || '').replace(/\r\n?/g, '\n').split('\n');
    return e('div', {className: `${baseClass} whitespace-pre-wrap break-words`},
        lines.map((line, i) => {
            const trimmed = String(line || '').trim();
            const isCohort = /^(cohort\s*[A-Z0-9]+|[A-D]\s*[:：\-]|part\s*[A-Z0-9]+)/i.test(trimmed);
            const isBlank = !trimmed;
            return e('div', {
                key: i,
                className: isCohort ? 'font-semibold text-slate-800 mt-2' : '',
                style: isBlank ? { minHeight: '0.85rem' } : {}
            }, isBlank ? ' ' : line);
        })
    );
};

const mapImportedRow = (header, row) => {
    const headerMap = {
        code: ['code', '代號', '試驗代碼'],
        studyTitle: ['studytitle', 'study title', '試驗名稱', '試驗標題', 'title'],
        phase: ['phase', '期別', '試驗期別'],
        sponsor: ['sponsor', '贊助商'],
        targetNum: ['targetnum', 'target', '目標收案', '目標收案數'],
        enrolled: ['enrolled', '已收案', '收案數', '目前已收案'],
        monthSigned: ['monthsigned', '本月簽署', '當月簽署', '簽署'],
        monthEnrolled: ['monthenrolled', '本月入案', '當月入案', '入案'],
        pi: ['pi', '主持人', 'pi name', 'investigator'],
        nurse: ['nurse', 'sc', 'study nurse', '研究護士', '護理師'],
        phone: ['phone', '電話', '分機', 'line id', '聯絡方式'],
        comments: ['comments', 'comment', '備註', '附註', '狀態', 'comments/status'],
        inclusion: ['inclusion', '收案條件', '納入條件', '主要收案條件'],
        exclusion: ['exclusion', '排除條件']
    };
    const findIndex = (keys) => header.findIndex(h => keys.includes(normalizeText(h).toLowerCase()));
    const get = (keys) => {
        const i = findIndex(keys);
        return i >= 0 ? row[i] : '';
    };
    return {
        code: get(headerMap.code),
        studyTitle: get(headerMap.studyTitle),
        phase: get(headerMap.phase),
        sponsor: get(headerMap.sponsor),
        targetNum: get(headerMap.targetNum),
        enrolled: get(headerMap.enrolled),
        monthSigned: get(headerMap.monthSigned),
        monthEnrolled: get(headerMap.monthEnrolled),
        pi: get(headerMap.pi),
        nurse: get(headerMap.nurse),
        phone: get(headerMap.phone),
        comments: get(headerMap.comments),
        inclusion: get(headerMap.inclusion),
        exclusion: get(headerMap.exclusion)
    };
};

const parseStudyStatusCsv = (csvText) => {
    const lines = String(csvText || '').replace(/^\uFEFF/, '').split(/\r?\n/).filter(Boolean);
    if (lines.length < 2) return [];
    const headers = parseCsvLine(lines[0]);
    const rows = lines.slice(1).map(parseCsvLine);
    return rows.map((row) => mapImportedRow(headers, row))
        .filter(item => normalizeCode(item.code));
};


const parseExcelFile = async (file) => {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    const header = (rows[0] || []).map(v => normalizeText(v));
    const parsed = rows.slice(1).map(row => mapImportedRow(header, row)).filter(item => normalizeCode(item.code));
    const text = rows.map(r => r.map(v => (v ?? '')).join('\t')).join('\n');
    return { rows, text, parsed };
};

function AccessPasswordModal(props) {
    const [password, setPassword] = useState('');
    const [error, setError] = useState(false);
    
    const handleSubmit = (ev) => {
        ev.preventDefault();
        if (props.onAuth(password)) {
            setError(false);
        } else {
            setError(true);
        }
    };
    
    return e('div', {className: 'min-h-screen flex items-center justify-center p-4'},
        e('div', {className: 'bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md'},
            e('div', null,
                e('h2', {className: 'text-2xl font-bold text-center mb-2'}, '臨床試驗管理系統 v3.6.5'),
                e('p', {className: 'text-center text-xs text-gray-500 mb-4'}, 'Realtime Database 協作完整版')
            ),
            e('form', {onSubmit: handleSubmit},
                e('input', {
                    type: 'password',
                    value: password,
                    onChange: (ev) => setPassword(ev.target.value),
                    placeholder: '請輸入密碼',
                    className: 'w-full px-4 py-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500',
                    autoFocus: true
                }),
                error && e('div', {className: 'text-red-600 text-sm mb-4'}, '密碼錯誤'),
                e('button', {
                    type: 'submit',
                    className: 'w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold'
                }, '進入系統')
            )
        )
    );
}

function TrialCard(props) {

    const [expanded, setExpanded] = useState(false);
    const trial = props.trial;
    
    return e('div', {className: 'bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow'},
        e('div', {className: 'flex justify-between items-start mb-4'},
            e('div', null,
                e('h3', {className: 'text-xl font-bold text-gray-800'}, trial.code),
                e('p', {
                    className: expanded
                        ? 'text-gray-600 mt-1 whitespace-pre-wrap break-words'
                        : 'text-gray-600 mt-1'
                }, expanded ? trial.studyTitle : ((trial.studyTitle || '').replace(/\s+/g, ' ').trim().length > 120 ? (trial.studyTitle || '').replace(/\s+/g, ' ').trim().substring(0, 120) + '...' : (trial.studyTitle || '').replace(/\s+/g, ' ').trim()))
            ),
            e('span', {
                className: trial.status === '進行中' 
                    ? 'px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm'
                    : 'px-3 py-1 bg-gray-100 text-gray-800 rounded-full text-sm'
            }, trial.status)
        ),
        e('div', {className: 'flex flex-wrap gap-2 mb-4'},
            (() => {
                if (trial.cancerTypes && trial.cancerTypes.length > 0) {
                    const tags = [];
                    trial.cancerTypes.forEach((ct, idx) => {
                        if (ct.lines) {
                            ct.lines.forEach((line, lineIdx) => {
                                tags.push(e('span', {
                                    key: idx + '-' + lineIdx,
                                    className: 'px-3 py-1 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-full text-sm'
                                }, ct.type + ' - ' + line));
                            });
                        }
                    });
                    return tags;
                } else {
                    return e('span', {className: 'px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm'},
                        trial.cancerType + ' - ' + trial.line
                    );
                }
            })()
        ),

function TrialFormModal(props) {
    const isEdit = !!props.trial;
    const [form, setForm] = useState(props.trial || {
        code: '',
        studyTitle: '',
        phase: '',
        sponsor: '',
        targetNum: '',
        enrolled: 0,
        pi: '',
        nurse: '',
        phone: '',
        comments: '',
        status: '進行中',
        inclusion: '',
        exclusion: ''
    });
    
    const [cancerLines, setCancerLines] = useState(() => {
        if (props.trial && props.trial.cancerTypes) {
            return props.trial.cancerTypes.map(ct => ({
                type: ct.type,
                lines: ct.lines ? ct.lines.join(', ') : ''
            }));
        }
        return [{type: '', lines: ''}];
    });
    
    const handleSubmit = (ev) => {
        ev.preventDefault();
        
        if (!form.code || !form.studyTitle) {
            alert('請填寫試驗代碼和標題');
            return;
        }
        
        const cancerTypes = cancerLines
            .filter(cl => cl.type && cl.lines)
            .map(cl => ({
                type: cl.type,
                lines: cl.lines.split(',').map(l => l.trim()).filter(Boolean)
            }));
        
        if (cancerTypes.length === 0) {
            alert('請至少添加一個癌症類型和治療線');
            return;
        }
        
        const trialData = {
            ...form,
            cancerTypes: cancerTypes,
            id: isEdit ? form.id : Date.now(),
            targetNum: parseInt(form.targetNum) || 0,
            enrolled: parseInt(form.enrolled) || 0
        };
        
        props.onSave(trialData);
    };
    
    const update = (field, value) => {
        setForm({...form, [field]: value});
    };
    
    const addCancerLine = () => {
        setCancerLines([...cancerLines, {type: '', lines: ''}]);
    };
    
    const removeCancerLine = (index) => {
        if (cancerLines.length > 1) {
            setCancerLines(cancerLines.filter((_, i) => i !== index));
        }
    };
    
    const updateCancerLine = (index, field, value) => {
        const updated = [...cancerLines];
        updated[index][field] = value;
        setCancerLines(updated);
    };
    
    return e('div', {className: 'fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center z-50 pt-24 pb-8 px-4 overflow-y-auto'},
        e('div', {className: 'bg-white rounded-2xl shadow-2xl p-6 w-full max-w-4xl max-h-[calc(100vh-8rem)] overflow-y-auto'},
            e('div', {className: 'flex justify-between items-center mb-6'},
                e('h3', {className: 'text-2xl font-bold text-slate-800'}, isEdit ? '編輯試驗' : '新增試驗'),
                e('button', {
                    onClick: props.onClose,
                    className: 'text-gray-500 hover:text-gray-700 text-3xl font-bold leading-none'
                }, '×')
            ),
            e('form', {onSubmit: handleSubmit, className: 'space-y-5'},
                e('div', {className: 'grid grid-cols-2 gap-4'},
                    e('div', null,
                        e('label', {className: 'block text-sm font-semibold text-slate-700 mb-1'}, '試驗代碼 *'),
                        e('input', {
                            type: 'text',
                            required: true,
                            value: form.code,
                            onChange: (ev) => update('code', ev.target.value),
                            className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none'
                        })
                    ),
                    e('div', null,
                        e('label', {className: 'block text-sm font-semibold text-slate-700 mb-1'}, '試驗期別'),
                        e('input', {
                            type: 'text',
                            value: form.phase,
                            onChange: (ev) => update('phase', ev.target.value),
                            placeholder: '例：III',
                            className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none'
                        })
                    )
                ),
                e('div', null,
                    e('label', {className: 'block text-sm font-semibold text-slate-700 mb-1'}, '試驗標題 *'),
                    e('textarea', {
                        required: true,
                        value: form.studyTitle,
                        onChange: (ev) => update('studyTitle', ev.target.value),
                        rows: 2,
                        className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none'
                    })
                ),
                e('div', {className: 'border-t-2 border-slate-200 pt-4'},
                    e('div', {className: 'flex justify-between items-center mb-3'},
                        e('label', {className: 'text-sm font-semibold text-slate-700'}, '癌症類型與治療線 *'),
                        e('button', {
                            type: 'button',
                            onClick: addCancerLine,
                            className: 'px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition-colors'
                        }, '+ 添加')
                    ),
                    e('div', {className: 'space-y-2'},
                        cancerLines.map((cl, idx) =>
                            e('div', {key: idx, className: 'flex gap-2 items-start'},
                                e('div', {className: 'flex-1'},
                                    e('input', {
                                        type: 'text',

function ImportStatusModal(props) {
    const [csvText, setCsvText] = useState('');
    const [previewCount, setPreviewCount] = useState(0);
    const [fileName, setFileName] = useState('');
    const [busy, setBusy] = useState(false);
    const [parsedRows, setParsedRows] = useState(null);

    const handlePreview = () => {
        const parsed = parsedRows || parseStudyStatusCsv(csvText);
        setPreviewCount(parsed.length);
    };

    const handleFile = async (ev) => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;

        setBusy(true);
        setFileName(file.name);

        try {
            if (file.name.match(/\.(xlsx|xls)$/i)) {
                const result = await parseExcelFile(file);
                setCsvText(result.text);
                setParsedRows(result.parsed || null);
                setPreviewCount((result.parsed || []).length);
                alert(`Excel讀取成功：${(result.parsed || []).length} 筆`);
            } else {
                const text = await file.text();
                setCsvText(text);
                setParsedRows(null);
                const parsed = parseStudyStatusCsv(text);
                setPreviewCount(parsed.length);
                alert(`CSV讀取成功：${parsed.length} 筆`);
            }
        } catch (e) {
            console.error(e);
            alert('檔案讀取失敗');
        } finally {
            setBusy(false);
        }
    };

    const handleImport = async () => {
        const parsed = parsedRows || parseStudyStatusCsv(csvText);
        if (!parsed.length) {
            alert('沒有讀到任何有效資料，請確認 CSV / Excel 內容與欄位名稱。');
            return;
        }
        await props.onImport(parsed);
    };

    return e('div', {className: 'fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center z-50 pt-24 pb-8 px-4 overflow-y-auto'},
        e('div', {className: 'bg-white rounded-2xl shadow-2xl p-6 w-full max-w-5xl max-h-[calc(100vh-8rem)] overflow-y-auto'},
            e('div', {className: 'flex justify-between items-center mb-4'},
                e('h3', {className: 'text-2xl font-bold text-slate-800'}, '匯入 Study Status'),
                e('button', {
                    onClick: props.onClose,
                    className: 'text-gray-500 hover:text-gray-700 text-3xl font-bold leading-none'
                }, '×')
            ),
            e('div', {className: 'mb-4 p-3 bg-amber-50 rounded-lg text-sm text-amber-800'},
                '可直接上傳 Excel / CSV，或貼上 Excel 複製內容。系統會用 code 當唯一鍵自動 upsert。'
            ),
            e('div', {className: 'mb-4 p-4 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50'},
                e('div', {className: 'font-semibold mb-2 text-slate-800'}, '上傳檔案'),
                e('input', {
                    type: 'file',
                    accept: '.xlsx,.xls,.csv,text/csv',
                    onChange: handleFile,
                    className: 'block w-full text-sm'
                }),
                fileName && e('div', {className: 'text-xs text-slate-500 mt-2'}, `已選擇：${fileName}`),
                busy && e('div', {className: 'text-xs text-blue-600 mt-2'}, '讀取中...')
            ),
            e('div', {className: 'mb-3 p-3 bg-slate-50 rounded-lg text-xs text-slate-700 whitespace-pre-wrap'},
                '需要欄位：code, studyTitle, phase, sponsor, targetNum, enrolled, monthSigned, monthEnrolled, pi, nurse, phone, comments'
            ),
            e('textarea', {
                value: csvText,
                onChange: (ev) => { setCsvText(ev.target.value); setParsedRows(null); },
                rows: 14,
                placeholder: '可直接貼上 Excel 內容或 CSV 內容…',
                className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none font-mono text-sm'
            }),
            e('div', {className: 'mt-4 flex flex-wrap gap-3 items-center'},
                e('button', {
                    type: 'button',
                    onClick: handlePreview,
                    className: 'px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700'
                }, '預覽筆數'),
                e('div', {className: 'text-sm text-slate-700'},
                    previewCount ? `已解析 ${previewCount} 筆` : '尚未預覽'
                ),
                e('button', {
                    type: 'button',
                    onClick: handleImport,
                    className: 'ml-auto px-5 py-2 bg-gradient-to-r from-emerald-500 to-green-600 text-white rounded-lg hover:from-emerald-600 hover:to-green-700 font-semibold'
                }, '匯入並自動合併更新')
            )
        )
    );
}

function App() {
    const [isAuth, setIsAuth] = useState(false);
    const [isAdmin, setIsAdmin] = useState(false);
    const [trials, setTrials] = useState([]);
    const [subjects, setSubjects] = useState([]);
    const [search, setSearch] = useState('');
    const [cancerType, setCancerType] = useState('全部');
    const [selectedLine, setSelectedLine] = useState('全部');
    const [loading, setLoading] = useState(true);
    const [selectedTrial, setSelectedTrial] = useState(null);
    const [showSubjects, setShowSubjects] = useState(false);
    const [showAddModal, setShowAddModal] = useState(false);
    const [showEditModal, setShowEditModal] = useState(null);
    const [showImportModal, setShowImportModal] = useState(false);
    const [syncStatus, setSyncStatus] = useState('');
    
    useEffect(() => {
        let rootRef = null;
        let handler = null;
        let resolved = false;
        let timeoutId = null;

        const loadData = async () => {
            try {
                const stored = localStorage.getItem('clinical-trials-encrypted');
                const storedSubjects = localStorage.getItem('clinical-trials-subjects');
                const localTrials = stored ? decryptData(stored) : null;
                const localSubjects = storedSubjects ? decryptData(storedSubjects) : null;

                const fallbackTrials = Array.isArray(localTrials) && localTrials.length > 0 ? localTrials : INITIAL_TRIALS;
                const fallbackSubjects = Array.isArray(localSubjects) ? localSubjects : [];

                timeoutId = setTimeout(() => {
                    if (resolved) return;
                    resolved = true;
                    setTrials(fallbackTrials);
                    setSubjects(fallbackSubjects);
                    setLoading(false);
                    setSyncStatus('雲端連線較慢，已改用本機資料');
                }, 7000);

                rootRef = getRootRef();

                if (!rootRef) {
                    if (timeoutId) clearTimeout(timeoutId);
                    resolved = true;
                    setTrials(fallbackTrials);
                    setSubjects(fallbackSubjects);
                    setLoading(false);
                    setSyncStatus('未連上雲端，使用本機資料');
                    return;
                }

                handler = async (snapshot) => {
                    const val = snapshot.val();
                    const remoteTrials = val && val.trials ? decryptData(val.trials) : null;
                    const remoteSubjects = val && val.subjects ? decryptData(val.subjects) : null;

                    if (Array.isArray(remoteTrials) && remoteTrials.length > 0) {
                        if (timeoutId) clearTimeout(timeoutId);
                        resolved = true;
                        setTrials(remoteTrials);
                        setSubjects(Array.isArray(remoteSubjects) ? remoteSubjects : []);
                        localStorage.setItem('clinical-trials-encrypted', val.trials);
                        if (val.subjects) localStorage.setItem('clinical-trials-subjects', val.subjects);
                        setSyncStatus(`雲端同步中（${remoteTrials.length} 個試驗）`);
                        setLoading(false);
                    } else {
                        try {
                            await saveAllData(fallbackTrials, fallbackSubjects);
                            if (timeoutId) clearTimeout(timeoutId);
                            resolved = true;
                            setTrials(fallbackTrials);
                            setSubjects(fallbackSubjects);
                            setLoading(false);
                            setSyncStatus(`已推送本機資料到雲端（${fallbackTrials.length} 個試驗）`);
                        } catch (e) {
                            console.error(e);
                            if (timeoutId) clearTimeout(timeoutId);
                            resolved = true;
                            setTrials(fallbackTrials);
                            setSubjects(fallbackSubjects);
                            setLoading(false);
                            setSyncStatus('雲端推送失敗，暫用本機資料');
                        }
                    }
                };

                rootRef.on('value', handler, (error) => {
                    console.error('Firebase read error:', error);
                    if (timeoutId) clearTimeout(timeoutId);
                    resolved = true;
                    setTrials(fallbackTrials);
                    setSubjects(fallbackSubjects);
                    setLoading(false);
                    setSyncStatus('雲端讀取失敗，改用本機資料');
                });
            } catch (error) {
                console.error('Load error:', error);
                if (timeoutId) clearTimeout(timeoutId);
                resolved = true;
                setTrials(INITIAL_TRIALS);
                setSubjects([]);
                setLoading(false);
                setSyncStatus('讀取失敗，改用預設資料');
            }
        };

        loadData();

        return () => {
            if (timeoutId) clearTimeout(timeoutId);
            if (rootRef && handler) rootRef.off('value', handler);
        };
    }, []);
    
    const saveTrials = async (data) => {
        setTrials(data);
        await saveAllData(data, subjects);
        setSyncStatus(`已同步到雲端（${data.length} 個試驗）`);
    };

    const handleSaveTrial = async (trialData) => {
        const existing = trials.find(t => t.id === trialData.id);
        let updatedTrials;
        
        if (existing) {
            updatedTrials = trials.map(t => t.id === trialData.id ? trialData : t);
        } else {
            updatedTrials = [...trials, trialData];
        }
        
        setTrials(updatedTrials);
        await saveTrials(updatedTrials);
        setShowAddModal(false);
        setShowEditModal(null);
        alert(existing ? '試驗已更新！' : '試驗已新增！');
    };

    const handleImportStudyStatus = async (incomingRows) => {
        const merged = upsertTrialsByCode(trials, incomingRows);
        setTrials(merged);
        await saveTrials(merged);
        setShowImportModal(false);
        alert(`已完成匯入，共處理 ${incomingRows.length} 筆；以 code 自動合併更新。`);
    };
    

    const handlePushToCloud = async () => {
        try {
            await saveAllData(trials, subjects);
            setSyncStatus(`已手動推送到雲端（${trials.length} 個試驗）`);
            alert('已手動同步到 Firebase');
        } catch (error) {
            console.error(error);
            alert('手動同步失敗');
        }
    };

    const handleReloadFromCloud = async () => {
        try {
            const val = await loadRemoteDataOnce();
            const remoteTrials = val && val.trials ? decryptData(val.trials) : null;
            const remoteSubjects = val && val.subjects ? decryptData(val.subjects) : null;
            if (Array.isArray(remoteTrials)) {
                setTrials(remoteTrials);
                setSubjects(Array.isArray(remoteSubjects) ? remoteSubjects : []);
                setSyncStatus(`已從雲端重載（${remoteTrials.length} 個試驗）`);
                alert('已從 Firebase 重新載入');
            } else {
                alert('雲端目前沒有有效資料');
            }
        } catch (error) {
            console.error(error);
            alert('雲端重載失敗');
        }
    };

    const downloadCSV = () => {
        const headers = ['試驗代碼', '試驗標題', '癌症類型與治療線', '期別', 'PI', '護理師', '電話', '狀態', '收案進度'];
        const rows = filtered.map(trial => {
            const cancerInfo = trial.cancerTypes ? trial.cancerTypes.map(ct => 
                `${ct.type}: ${ct.lines ? ct.lines.join(', ') : ''}`
            ).join('; ') : '';
            
            return [
                trial.code || '',
                trial.studyTitle || '',
                cancerInfo,
                trial.phase || '',
                trial.pi || '',
                trial.nurse || '',
                trial.phone || '',
                trial.status || '',
                `${trial.enrolled || 0}/${trial.targetNum || 0}`
            ];
        });
        
        const csvContent = [headers, ...rows]
            .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
            .join('\n');
        
        const BOM = '\uFEFF';
        const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `臨床試驗列表_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    };
    
    const generatePDF = () => {
        const printWindow = window.open('', '_blank');
        const htmlContent = `
            <!DOCTYPE html>
            <html>
              <head>
                <meta charset="UTF-8">
                <title>臨床試驗管理列表</title>
                <style>
                  body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; }
                  h1 { text-align: center; color: #1e293b; margin-bottom: 10px; }
                  .header-info { text-align: center; margin-bottom: 15px; color: #64748b; }
                  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
                  th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: left; font-size: 11px; }
                  th { background-color: #f1f5f9; font-weight: bold; color: #1e293b; }
                  tr:nth-child(even) { background-color: #f8fafc; }
                  .status-active { color: #059669; font-weight: bold; }
                  .status-paused { color: #f59e0b; font-weight: bold; }
                  .status-full { color: #dc2626; font-weight: bold; }
                  @media print {
                    body { margin: 10px; }
                    table { font-size: 10px; }
                  }
                </style>
              </head>
              <body>
                <h1>臨床試驗管理列表</h1>
                <div class="header-info">匯出日期: ${new Date().toLocaleDateString('zh-TW')} | 共 ${filtered.length} 項試驗</div>
                <table>
                  <thead>
                    <tr>
                      <th>代碼</th>
                      <th>試驗標題</th>
                      <th>癌症類型與治療線</th>
                      <th>期別</th>
                      <th>PI</th>
                      <th>護理師</th>
                      <th>電話</th>
                      <th>狀態</th>
                      <th>收案進度</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${filtered.map(trial => {
                        const cancerInfo = trial.cancerTypes ? trial.cancerTypes.map(ct => 
                            `${ct.type}: ${ct.lines ? ct.lines.join(', ') : ''}`
                        ).join('<br>') : '';
                        
                        const statusClass = trial.status === '進行中' ? 'status-active' : 
                                          trial.status === '暫停收案' ? 'status-paused' : 'status-full';
                        
                        return `
                          <tr>
                            <td>${trial.code || ''}</td>
                            <td>${trial.studyTitle || ''}</td>
                            <td>${cancerInfo}</td>
                            <td>${trial.phase || ''}</td>
                            <td>${trial.pi || ''}</td>
                            <td>${trial.nurse || ''}</td>
                            <td>${trial.phone || ''}</td>
                            <td class="${statusClass}">${trial.status || ''}</td>
                            <td>${trial.enrolled || 0}/${trial.targetNum || 0}</td>
                          </tr>
                        `;
                    }).join('')}
                  </tbody>
                </table>
              </body>
            </html>
        `;
        printWindow.document.write(htmlContent);
        printWindow.document.close();
        setTimeout(() => {
            try { printWindow.focus(); printWindow.print(); } catch (e) {}
        }, 300);
    };
    
    const saveSubjects = async (data) => {
        setSubjects(data);
        await saveAllData(trials, data);
        setSyncStatus('受試者資料已同步到雲端');
    };
    
    const handleAuth = (password) => {
        if (password === CONFIG.ACCESS_PASSWORD) {
            setIsAuth(true);
            return true;
        }
        return false;
    };
    
    const handleLogin = () => {
        const username = prompt('帳號:');
        const password = prompt('密碼:');
        if (username === CONFIG.ADMIN_USERNAME && password === CONFIG.ADMIN_PASSWORD) {
            setIsAdmin(true);
        } else {
            alert('帳號或密碼錯誤');
        }
    };
    
    const handleEdit = (trial) => {
        setShowEditModal(trial);
    };
    
    const handleDelete = async (id) => {
        if (confirm('確定要刪除此試驗？')) {
            const updated = trials.filter(t => t.id !== id);
            setTrials(updated);
            await saveTrials(updated);
        }
    };
    
    const handleManageSubjects = (trial) => {
        setSelectedTrial(trial);
        setShowSubjects(true);
    };
    
    const handleAddSubject = async (trialId, data) => {
        const newSubject = {
            ...data,
            id: Date.now(),
            trialIds: [trialId],
            createdAt: new Date().toISOString()
        };
        const updated = [...subjects, newSubject];
        await saveSubjects(updated);
    };
    
    const filtered = useMemo(() => {
        let result = trials;
        
        // 搜尋篩選
        if (search) {
            const q = search.toLowerCase().trim();
            const normalize = (v) => String(v || '').toLowerCase().replace(/[\s　]+/g, ' ').trim();
            const haystack = (t) => [
                t.studyTitle,
                t.code,
                t.sponsor,
                t.pi,
                t.nurse,
                t.phone,
                Array.isArray(t.cancerTypes) ? t.cancerTypes.map(ct => `${ct.type || ''} ${(ct.lines || []).join(' ')}`).join(' ') : '',
                t.comments
            ].map(normalize).join(' | ');
            result = result.filter(t => haystack(t).includes(q));
        }
        
        // 癌症類型篩選
        if (cancerType !== '全部') {
            result = result.filter(t =>
                t.cancerTypes && t.cancerTypes.some(ct => ct.type === cancerType) ||
                t.cancerType === cancerType
            );
        }
        
        // 治療線篩選
        if (selectedLine !== '全部') {
            result = result.filter(t => {
                const matchRules = {
                    '第一線': ['第一線', '一線'],
                    '第二線': ['第二線', '二線', '第一線後', '一線後', '二/三線', '二、三線', '二線/三線'],
                    '第三線': ['第三線', '三線', '第二線後', '二線後', '二/三線', '二、三線', '二線/三線'],
                    'Adjuvant': ['Adjuvant', '觀察性'],
                    '多線': ['多線']
                };
                
                const rulesToMatch = matchRules[selectedLine] || [selectedLine];
                
                // 檢查 cancerTypes[].lines[]
                if (t.cancerTypes && t.cancerTypes.length > 0) {
                    for (let ct of t.cancerTypes) {
                        if (ct.lines && ct.lines.length > 0) {
                            for (let line of ct.lines) {
                                if (rulesToMatch.includes(line)) {
                                    return true;
                                }
                            }
                        }
                    }
                }
                
                // 檢查 line
                if (t.line && rulesToMatch.includes(t.line)) {
                    return true;
                }
                
                return false;
            });
        }
        
        return result;
    }, [trials, search, cancerType, selectedLine]);
    
    const cancerTypes = useMemo(() => {
        const types = new Set();
        trials.forEach(trial => {
            if (trial.cancerTypes && trial.cancerTypes.length > 0) {
                trial.cancerTypes.forEach(ct => types.add(ct.type));
            } else if (trial.cancerType) {
                types.add(trial.cancerType);
            }
        });
        return ['全部', ...Array.from(types).sort()];
    }, [trials]);
    
    const treatmentLines = useMemo(() => {
        return ['全部', '第一線', '第二線', '第三線', 'Adjuvant', '多線'];
    }, [trials]);
    
    if (!isAuth) {
        return e(AccessPasswordModal, {onAuth: handleAuth});
    }
    
    if (loading) {
        return e('div', {className: 'min-h-screen flex items-center justify-center'},
            e('div', {className: 'text-xl'}, '載入中...')
        );
    }
    
    return e('div', {className: 'min-h-screen'},
        e('div', {className: 'bg-white shadow-lg mt-16 sticky top-0 z-50'},
            e('div', {className: 'max-w-7xl mx-auto px-4 py-4'},
                e('div', {className: 'flex items-center justify-between'},
                    e('h1', {className: 'text-2xl font-bold text-slate-800'}, '臨床試驗管理系統 v3.6.5'),
                    e('button', {
                        onClick: isAdmin ? () => setIsAdmin(false) : handleLogin,
                        className: 'px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700'
                    }, isAdmin ? '登出' : '管理員登入')
                )
            )
        ),
        e('div', {className: 'max-w-7xl mx-auto px-4 py-8'},
            e('div', {className: 'flex gap-3 mb-6'},
                isAdmin && e('button', {
                    onClick: () => setShowAddModal(true),
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 4v16m8-8H4'})
                    ),
                    '新增試驗'
                ),
                isAdmin && e('button', {
                    onClick: () => setShowImportModal(true),
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white rounded-xl hover:from-violet-600 hover:to-fuchsia-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V3m0 9l-3-3m3 3l3-3'})
                    ),
                    '匯入資料'
                ),
                e('button', {
                    onClick: downloadCSV,
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4'})
                    ),
                    '下載 Excel'
                ),
                e('button', {
                    onClick: generatePDF,
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-red-500 to-rose-500 text-white rounded-xl hover:from-red-600 hover:to-rose-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'})
                    ),
                    '匯出 PDF'
                )
            ),
            syncStatus && e('div', {className: 'mb-4 text-sm text-slate-600'}, syncStatus),
            e('div', {className: 'mb-6 space-y-4'},
                e('input', {
                    type: 'text',
                    value: search,
                    onChange: (ev) => setSearch(ev.target.value),
                    placeholder: '搜尋試驗代碼、標題、PI...',
                    className: 'w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500'
                }),
                e('div', {className: 'grid grid-cols-2 gap-4'},
                    e('select', {
                        value: cancerType,
                        onChange: (ev) => setCancerType(ev.target.value),
                        className: 'w-full px-4 py-2 border rounded-lg'
                    }, cancerTypes.map(type =>
                        e('option', {key: type, value: type}, type)
                    )),
                    e('select', {
                        value: selectedLine,
                        onChange: (ev) => setSelectedLine(ev.target.value),
                        className: 'w-full px-4 py-2 border rounded-lg'
                    }, treatmentLines.map(line =>
                        e('option', {key: line, value: line}, line)
                    ))
                )
            ),
            e('div', {className: 'text-gray-600 mb-4'},
                '找到 ' + filtered.length + ' 個試驗'
            ),
            e('div', {className: 'grid gap-6'},
                filtered.map(trial =>
                    e(TrialCard, {
                        key: trial.id,
                        trial: trial,
                        isLoggedIn: isAdmin,
                        onEdit: handleEdit,
                        onDelete: handleDelete,
                        onManageSubjects: handleManageSubjects
                    })
                )
            )
        ),
        showSubjects && selectedTrial && e(SubjectsListModal, {
            trial: selectedTrial,
            subjects: subjects,
            onClose: () => {
                setShowSubjects(false);
                setSelectedTrial(null);
            },
            onAddSubject: handleAddSubject
        }),
            showAddModal && e(TrialFormModal, {
                onSave: handleSaveTrial,
                onClose: () => setShowAddModal(false)
            }),
            showEditModal && e(TrialFormModal, {
                trial: showEditModal,
                onSave: handleSaveTrial,
                onClose: () => setShowEditModal(null)
            }),
            showImportModal && e(ImportStatusModal, {
                onImport: handleImportStudyStatus,
                onClose: () => setShowImportModal(false)
            })
    );
}

ReactDOM.render(e(App), document.getElementById('app'));
    </script>
</body>
</html>
