// Firebase Firestore 自動同步設定（已內建，不需每台電腦手動輸入）
const saveAllData = async (trialsData, subjectsData) => {
    const encryptedTrials = encryptData(trialsData || []);
    const encryptedSubjects = encryptData(subjectsData || []);
    if (encryptedTrials) localStorage.setItem('clinical-trials-encrypted', encryptedTrials);
    if (encryptedSubjects) localStorage.setItem('clinical-trials-subjects', encryptedSubjects);
    localStorage.setItem('clinical-trials-meta', JSON.stringify({
        updatedAt: new Date().toISOString(),
        trialsCount: (trialsData || []).length,
        subjectsCount: (subjectsData || []).length,
        source: 'local-only'
    }));
    return true;
};

const encryptData = (data) => {
    try {
        return CryptoJS.AES.encrypt(JSON.stringify(data), CONFIG.ENCRYPTION_KEY).toString();
    } catch (error) {
        return null;
    }
};

const decryptData = (encrypted) => {
    try {
        const bytes = CryptoJS.AES.decrypt(encrypted, CONFIG.ENCRYPTION_KEY);
        return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
    } catch (error) {
        return null;
    }
};

const normalizeCode = (v) => String(v || '').trim().toUpperCase();
const normalizeText = (v) => String(v || '').replace(/\s+/g, ' ').trim();
const normalizeFilterValue = (v) => String(v || '').toLowerCase().replace(/[\s　\r\n]+/g, '').replace(/[、，,\/／\-–—_()（）]+/g, '').trim();
const valueMatches = (a, b) => normalizeFilterValue(a) === normalizeFilterValue(b);
const lineMatchesSelection = (line, selected) => {
    if (!selected || selected === '全部') return true;
    const n = normalizeFilterValue(line);
    if (!n) return false;
    if (selected === '第一線') return n.includes('第一線') || n.includes('一線') || n.includes('1l') || n.includes('firstline') || n.includes('一腺');
    if (selected === '第二線') return n.includes('第二線') || n.includes('二線') || n.includes('2l') || n.includes('一線後') || n.includes('二三線');
    if (selected === '第三線') return n.includes('第三線') || n.includes('三線') || n.includes('3l') || n.includes('二線後') || n.includes('二三線');
    if (selected === 'Adjuvant') return n.includes('adjuv') || n.includes('輔助') || n.includes('術後') || n.includes('觀察性');
    if (selected === '多線') return n.includes('多線') || n.includes('multi') || n.includes('後線') || n.includes('laterline');
    return normalizeFilterValue(selected) === n || n.includes(normalizeFilterValue(selected));
};

let firebaseAppInstance = null;
let firestoreInstance = null;

const initializeFirebaseApp = (firebaseConfig) => {
    if (!firebaseConfig || !firebaseConfig.apiKey || !firebaseConfig.projectId || !firebaseConfig.appId) {
        throw new Error('Firebase 設定不完整');
    }
    if (!firebaseAppInstance) {
        firebaseAppInstance = firebase.apps && firebase.apps.length
            ? firebase.app()
            : firebase.initializeApp(firebaseConfig);
    }
    if (!firestoreInstance) {
        firestoreInstance = firebase.firestore();
    }
    return firestoreInstance;
};

const cleanTrialForSave = (trial) => {
    const cleaned = { ...(trial || {}) };
    if (!cleaned.code) return null;
    cleaned.code = normalizeCode(cleaned.code);
    cleaned.studyTitle = normalizeText(cleaned.studyTitle);
    cleaned.sponsor = normalizeText(cleaned.sponsor);
    cleaned.pi = normalizeText(cleaned.pi);
    cleaned.nurse = normalizeText(cleaned.nurse);
    cleaned.phone = normalizeText(cleaned.phone);
    cleaned.comments = normalizeText(cleaned.comments);
    cleaned.phase = normalizeText(cleaned.phase);
    cleaned.status = normalizeText(cleaned.status);
    cleaned.inclusion = cleaned.inclusion || '';
    cleaned.exclusion = cleaned.exclusion || '';
    cleaned.targetNum = Number.isFinite(Number(cleaned.targetNum)) ? Number(cleaned.targetNum) : 0;
    cleaned.enrolled = Number.isFinite(Number(cleaned.enrolled)) ? Number(cleaned.enrolled) : 0;
    cleaned.monthSigned = Number.isFinite(Number(cleaned.monthSigned)) ? Number(cleaned.monthSigned) : 0;
    cleaned.monthEnrolled = Number.isFinite(Number(cleaned.monthEnrolled)) ? Number(cleaned.monthEnrolled) : 0;
    cleaned.updatedAt = new Date().toISOString();
    return cleaned;
};

const normalizeFirestoreTrial = (raw) => {
    const trial = { ...(raw || {}) };
    trial.code = normalizeCode(trial.code);
    trial.studyTitle = normalizeText(trial.studyTitle);
    trial.sponsor = normalizeText(trial.sponsor);
    trial.pi = normalizeText(trial.pi);
    trial.nurse = normalizeText(trial.nurse);
    trial.phone = normalizeText(trial.phone);
    trial.comments = normalizeText(trial.comments);
    trial.phase = trial.phase || '';
    trial.status = trial.status || '';
    trial.id = trial.id || trial.code || Date.now();
    trial.targetNum = Number.isFinite(Number(trial.targetNum)) ? Number(trial.targetNum) : 0;
    trial.enrolled = Number.isFinite(Number(trial.enrolled)) ? Number(trial.enrolled) : 0;
    trial.monthSigned = Number.isFinite(Number(trial.monthSigned)) ? Number(trial.monthSigned) : 0;
    trial.monthEnrolled = Number.isFinite(Number(trial.monthEnrolled)) ? Number(trial.monthEnrolled) : 0;
    if (!Array.isArray(trial.cancerTypes)) trial.cancerTypes = Array.isArray(trial.cancerTypes) ? trial.cancerTypes : [];
    return trial;
};

const subscribeFirestoreData = ({ firebaseConfig, onTrials, onSubjects, onStatus, onError }) => {
    try {
        const db = initializeFirebaseApp(firebaseConfig);
        const unsubTrials = db.collection('trials').onSnapshot((snapshot) => {
            const list = snapshot.docs.map((doc) => normalizeFirestoreTrial({ ...doc.data(), code: doc.id }));
            const merged = list.length ? upsertTrialsByCode(INITIAL_TRIALS, list) : INITIAL_TRIALS;
            onTrials(merged);
            onStatus && onStatus(`Firebase 同步中（${merged.length} 個試驗）`);
        }, onError);

        const unsubSubjects = db.collection('meta').doc('subjects').onSnapshot((doc) => {
            const data = doc.exists ? doc.data() : {};
            onSubjects(Array.isArray(data.items) ? data.items : []);
        }, onError);

        return () => {
            try { unsubTrials && unsubTrials(); } catch (e) {}
            try { unsubSubjects && unsubSubjects(); } catch (e) {}
        };
    } catch (error) {
        onError && onError(error);
        return () => {};
    }
};

const saveTrialToFirestore = async (firebaseConfig, trialData) => {
    const db = initializeFirebaseApp(firebaseConfig);
    const cleaned = cleanTrialForSave(trialData);
    if (!cleaned) throw new Error('trial code 不可空白');
    await db.collection('trials').doc(cleaned.code).set(cleaned, { merge: true });
    return cleaned;
};

const deleteTrialFromFirestore = async (firebaseConfig, code) => {

const saveSubjectsToFirestore = async (firebaseConfig, data) => {
    const db = initializeFirebaseApp(firebaseConfig);
    await db.collection('meta').doc('subjects').set({
        items: Array.isArray(data) ? data : [],
        updatedAt: new Date().toISOString()

};

const seedInitialTrialsToFirestore = async (firebaseConfig, trialsData) => {
    const db = initializeFirebaseApp(firebaseConfig);
    const existing = await db.collection('trials').limit(1).get();
    if (!existing.empty) return false;
    const batch = db.batch();
    (trialsData || []).forEach((trial) => {
        const cleaned = cleanTrialForSave(trial);
        if (cleaned && cleaned.code) {
            batch.set(db.collection('trials').doc(cleaned.code), cleaned, { merge: true });
        }
    });
    await batch.commit();
    return true;
};

const STATUS_KEYWORDS = ['暫停收案','名額已滿','停止收案','試驗結束','試驗終了','還未SIV','未SIV','預備中','close-out','closed','paused','suspended'];

const normalizeHeader = (value) => String(value || '').toLowerCase().replace(/[\s_\-（）()\/]+/g, '').trim();
const normalizeCellText = (value) => String(value ?? '').replace(/\r\n/g, '\n').trim();

const inferFieldFromHeader = (header) => {
    const normalized = normalizeHeader(header);
    for (const [field, aliases] of Object.entries(FIELD_ALIASES)) {
        if (aliases.some(alias => normalizeHeader(alias) === normalized)) return field;
    }
    return null;
};

const isHeaderRow = (row) => {
    const mapped = (row || []).map(inferFieldFromHeader);
    return mapped.includes('code') && mapped.includes('studyTitle');
};

const isMetaCancerCell = (value) => {
    const normalized = normalizeHeader(value);
    return !normalized || normalized === 'fff' || normalized === '進行中' || normalized === '試驗終了追蹤期間';
};

const detectStatusFromRow = (row) => {
    const joined = (row || []).map(v => normalizeCellText(v)).join(' ');
    const found = STATUS_KEYWORDS.find(keyword => joined.includes(keyword));
    return found || '';
};

const normalizeCancerLine = (cancerType, line) => {
    let c = normalizeCellText(cancerType);
    let l = normalizeCellText(line);
    if (!c && l.startsWith('肝癌')) {
        c = '肝癌';
        l = l.replace(/^肝癌/, '').trim();
    }
    return { cancerType: c, line: l };
};


const consolidateParsedTrials = (rows) => {
    const map = new Map();
    let duplicateCount = 0;
    (rows || []).forEach((row) => {
        const key = normalizeCode(row && row.code);
        if (!key) return;
        const current = map.get(key);
        if (!current) {
            map.set(key, { ...row, code: key });
            return;
        }
        duplicateCount++;
        const merged = { ...current };
        Object.entries(row || {}).forEach(([field, value]) => {
            if (field === 'cancerTypes') return;
            if (value !== undefined && value !== null && String(value).trim() !== '') merged[field] = value;
        });
        const ctMap = new Map();
        const addCt = (ct) => {
            if (!ct) return;
            const type = normalizeCellText(ct.type || '');
            const lines = Array.isArray(ct.lines) ? ct.lines.map(normalizeCellText).filter(Boolean) : [];
            if (!type && !lines.length) return;
            const k = normalizeFilterValue(type || '未分類');
            const prev = ctMap.get(k) || { type: type || '', lines: [] };
            lines.forEach(line => {
                if (line && !prev.lines.some(x => valueMatches(x, line))) prev.lines.push(line);
            });
            if (!prev.type && type) prev.type = type;
            ctMap.set(k, prev);
        };
        (Array.isArray(current.cancerTypes) ? current.cancerTypes : []).forEach(addCt);
        (Array.isArray(row.cancerTypes) ? row.cancerTypes : []).forEach(addCt);
        if (row.cancerType || row.line) addCt({ type: row.cancerType || '', lines: [row.line || ''].filter(Boolean) });
        merged.cancerTypes = Array.from(ctMap.values());
        if (!merged.cancerType && merged.cancerTypes[0]) merged.cancerType = merged.cancerTypes[0].type;
        if (!merged.line && merged.cancerTypes[0] && merged.cancerTypes[0].lines[0]) merged.line = merged.cancerTypes[0].lines[0];
        merged.code = key;
        map.set(key, merged);
    });
    return { rows: Array.from(map.values()), duplicateCount };
};

const analyzeParsedTrials = (rows) => {
    const valid = (rows || []).filter(item => normalizeCode(item && item.code));
    const consolidated = consolidateParsedTrials(valid);
    return { rows: consolidated.rows, rawCount: (rows || []).length, validCount: valid.length, uniqueCount: consolidated.rows.length, duplicateCount: consolidated.duplicateCount };
};

const parseRowsWithHeaderMapping = (rows) => {
    if (!rows || rows.length < 2) return [];
    let mappedFields = null;
    let currentCancerType = '';
    let currentLine = '';
    const parsed = [];

    for (const rawRow of rows) {
        const row = (rawRow || []).map(normalizeCellText);

        if (isHeaderRow(row)) {
            mappedFields = row.map(inferFieldFromHeader);
            continue;
        }

        if (!mappedFields) continue;

        const cancerCell = row[0] || '';
        const lineCell = row[1] || '';

        if (cancerCell && !isMetaCancerCell(cancerCell)) currentCancerType = cancerCell;

        if (lineCell) {
            const normalized = normalizeCancerLine(currentCancerType, lineCell);
            if (normalized.cancerType) currentCancerType = normalized.cancerType;
            if (normalized.line) currentLine = normalized.line;
        }

        const codeIndex = mappedFields.findIndex(v => v === 'code');
        const code = codeIndex >= 0 ? normalizeCode(row[codeIndex]) : '';
        if (!code) continue;

        const item = {};
        mappedFields.forEach((field, idx) => {
            if (!field) return;
            const value = row[idx];
            if (value !== undefined && value !== null && String(value).trim() !== '') {
                item[field] = value;
            }
        });

        if (!item.cancerType && currentCancerType) item.cancerType = currentCancerType;
        if (!item.line && currentLine) item.line = currentLine;
        if (!item.status) item.status = detectStatusFromRow(row) || '進行中';
        if (!item.inclusion && row[4]) item.inclusion = row[4];
        item.code = code;

        if (item.cancerType || item.line) {
            item.cancerTypes = [{ type: item.cancerType || '', lines: [item.line || ''] }];
        }

        parsed.push(item);
    }

    return consolidateParsedTrials(parsed.filter(item => normalizeCode(item.code))).rows;
};


const parseDelimitedLine = (line, delimiter) => {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];
        if (ch === '"') {
            if (inQuotes && next === '"') {
                current += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (ch === delimiter && !inQuotes) {
            result.push(current);
            current = '';
        } else {
            current += ch;
        }
    }
    result.push(current);
    return result.map(v => String(v || '').trim());
};


const upsertTrialsByCode = (existingTrials, incomingTrials) => {
    const map = new Map();

    (existingTrials || []).forEach((trial) => {
        const key = normalizeCode(trial.code);
        if (key) map.set(key, { ...trial });
    });

    (incomingTrials || []).forEach((incoming) => {
        const key = normalizeCode(incoming.code);
        if (!key) return;

        const prev = map.get(key) || {};
        const merged = {
            ...prev,
            ...incoming,
            id: prev.id || incoming.id || Date.now() + Math.floor(Math.random() * 1000),
            code: key,
            studyTitle: normalizeText(incoming.studyTitle || prev.studyTitle),
            sponsor: normalizeText(incoming.sponsor || prev.sponsor),
            pi: normalizeText(incoming.pi || prev.pi),
            nurse: normalizeText(incoming.nurse || prev.nurse),
            phone: normalizeText(incoming.phone || prev.phone),
            comments: normalizeText(incoming.comments || prev.comments),
            isArchived: Boolean(incoming.isArchived ?? prev.isArchived ?? false),
            archiveDate: normalizeText(incoming.archiveDate || prev.archiveDate),
            archiveReason: normalizeText(incoming.archiveReason || prev.archiveReason),
            targetNum: Number.isFinite(Number(incoming.targetNum)) ? Number(incoming.targetNum) : (prev.targetNum || 0),
            enrolled: Number.isFinite(Number(incoming.enrolled)) ? Number(incoming.enrolled) : (prev.enrolled || 0),
            monthSigned: Number.isFinite(Number(incoming.monthSigned)) ? Number(incoming.monthSigned) : (prev.monthSigned || 0),
            monthEnrolled: Number.isFinite(Number(incoming.monthEnrolled)) ? Number(incoming.monthEnrolled) : (prev.monthEnrolled || 0),
        };

        if (!Array.isArray(merged.cancerTypes) || merged.cancerTypes.length === 0) {
            merged.cancerTypes = Array.isArray(prev.cancerTypes) ? prev.cancerTypes : [];
        }

        map.set(key, merged);
    });

    return Array.from(map.values()).sort((a, b) => normalizeCode(a.code).localeCompare(normalizeCode(b.code)));
};

const parseCsvLine = (line) => parseDelimitedLine(line, ',');

const parseStudyStatusCsv = (csvText) => {
    const lines = String(csvText || '').replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => String(line || '').trim());
    if (lines.length < 2) return [];
    const delimiter = lines[0].includes('\t') ? '\t' : ',';
    const rows = lines.map(line => parseDelimitedLine(line, delimiter));
    return parseRowsWithHeaderMapping(rows);
};


const parseExcelFile = async (file) => {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    const text = rows.map(r => r.map(v => (v ?? '')).join('\t')).join('\n');
    const parsed = parseRowsWithHeaderMapping(rows);
    return { rows, text, parsed };
};

function AccessPasswordModal(props) {
    const [password, setPassword] = useState('');
    const [error, setError] = useState(false);
    
    const handleSubmit = (ev) => {
        ev.preventDefault();
        if (props.onAuth(password)) {
            setError(false);
        } else {
            setError(true);
        }
    };
    
    return e('div', {className: 'min-h-screen flex items-center justify-center p-4'},
        e('div', {className: 'bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md'},
            e('div', null,
                e('h2', {className: 'text-2xl font-bold text-center mb-2'}, '臨床試驗管理系統 v4.0.4 Firebase版'),
                e('p', {className: 'text-center text-xs text-gray-500 mb-4'}, 'Firestore 即時同步版')
            ),
            e('form', {onSubmit: handleSubmit},
                e('input', {
                    type: 'password',
                    value: password,
                    onChange: (ev) => setPassword(ev.target.value),
                    placeholder: '請輸入密碼',
                    className: 'w-full px-4 py-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-500',
                    autoFocus: true
                }),
                error && e('div', {className: 'text-red-600 text-sm mb-4'}, '密碼錯誤'),
                e('button', {
                    type: 'submit',
                    className: 'w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold'
                }, '進入系統')
            )
        )
    );
}

function TrialCard(props) {

    const [expanded, setExpanded] = useState(false);
    const trial = props.trial;
    
    return e('div', {className: 'bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow'},
        e('div', {className: 'flex justify-between items-start mb-4'},
            e('div', null,
                e('h3', {className: 'text-xl font-bold text-gray-800'}, trial.code),
                e('p', {
                    className: expanded
                        ? 'text-gray-600 mt-1 whitespace-pre-wrap break-words'
                        : 'text-gray-600 mt-1'
                }, expanded ? trial.studyTitle : (trial.studyTitle && trial.studyTitle.length > 100 ? trial.studyTitle.substring(0, 100) + '...' : (trial.studyTitle || '')))
            ),
            e('div', {className: 'flex items-center gap-2'},
                e('span', {
                    className: trial.status === '進行中' 
                        ? 'px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm'
                        : 'px-3 py-1 bg-gray-100 text-gray-800 rounded-full text-sm'
                }, trial.status),
                trial.isArchived && e('span', {
                    className: 'px-3 py-1 bg-slate-500 text-white rounded-full text-sm'
                }, '已封存')
            )
        ),
        e('div', {className: 'flex flex-wrap gap-2 mb-4'},
            (() => {
                if (trial.cancerTypes && trial.cancerTypes.length > 0) {
                    const tags = [];
                    trial.cancerTypes.forEach((ct, idx) => {
                        if (ct.lines) {
                            ct.lines.forEach((line, lineIdx) => {
                                tags.push(e('span', {
                                    key: idx + '-' + lineIdx,
                                    className: 'px-3 py-1 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-full text-sm'
                                }, ct.type + ' - ' + line));
                            });
                        }
                    });
                    return tags;
                } else {
                    return e('span', {className: 'px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm'},
                        trial.cancerType + ' - ' + trial.line
                    );
                }
            })()
        ),

                e('div', {className: 'grid grid-cols-3 gap-4 text-sm'},
            e('div', null,
                e('span', {className: 'text-gray-600'}, 'PI: '),
                e('span', {className: 'font-semibold'}, trial.pi)
            ),
            e('div', null,
                e('span', {className: 'text-gray-600'}, '護理師: '),
                e('span', {className: 'font-semibold'}, trial.nurse)
            ),
            e('div', null,
                e('span', {className: 'text-gray-600'}, '收案進度: '),
                e('span', {className: 'font-semibold'}, `${trial.enrolled || 0}/${trial.targetNum || 0}`)
            )
        ),
        expanded && e('div', {className: 'mt-4 pt-4 border-t space-y-3 text-sm'},
            e('div', null,
                e('div', {className: 'text-gray-600 font-semibold mb-1'}, '完整試驗名稱:'),
                e('div', {className: 'text-gray-800 whitespace-pre-wrap break-words'}, trial.studyTitle)
            ),
            e('div', {className: 'grid grid-cols-2 gap-4'},
                e('div', null,
                    e('span', {className: 'text-gray-600'}, '試驗期別: '),
                    e('span', null, trial.phase || '')

function TrialFormModal(props) {
    const isEdit = !!props.trial;
    const [form, setForm] = useState(props.trial || {
        code: '',
        studyTitle: '',
        phase: '',
        sponsor: '',
        targetNum: '',
        enrolled: 0,
        pi: '',
        nurse: '',
        phone: '',
        comments: '',
        status: '進行中',
        isArchived: false,
        archiveDate: '',
        archiveReason: '',
        inclusion: '',
        exclusion: ''
    });
    
    const [cancerLines, setCancerLines] = useState(() => {
        if (props.trial && props.trial.cancerTypes) {
            return props.trial.cancerTypes.map(ct => ({
                type: ct.type,
                lines: ct.lines ? ct.lines.join(', ') : ''
            }));
        }
        return [{type: '', lines: ''}];
    });
    
    const handleSubmit = (ev) => {
        ev.preventDefault();
        
        if (!form.code || !form.studyTitle) {
            alert('請填寫試驗代碼和標題');
            return;
        }
        
        const cancerTypes = cancerLines
            .filter(cl => cl.type && cl.lines)
            .map(cl => ({
                type: cl.type,
                lines: cl.lines.split(',').map(l => l.trim()).filter(Boolean)
            }));
        
        if (cancerTypes.length === 0) {
            alert('請至少添加一個癌症類型和治療線');
            return;
        }
        
        const trialData = {
            ...form,
            cancerTypes: cancerTypes,
            id: isEdit ? form.id : Date.now(),
            targetNum: parseInt(form.targetNum) || 0,
            enrolled: parseInt(form.enrolled) || 0,
            isArchived: !!form.isArchived,
            archiveDate: form.isArchived ? (form.archiveDate || new Date().toISOString().slice(0,10)) : '',
            archiveReason: form.isArchived ? (form.archiveReason || '') : ''
        };
        
        props.onSave(trialData);
    };
    
    const update = (field, value) => {
        setForm({...form, [field]: value});
    };
    
    const addCancerLine = () => {
        setCancerLines([...cancerLines, {type: '', lines: ''}]);
    };
    
    const removeCancerLine = (index) => {
        if (cancerLines.length > 1) {
            setCancerLines(cancerLines.filter((_, i) => i !== index));
        }
    };
    
    const updateCancerLine = (index, field, value) => {
        const updated = [...cancerLines];
        updated[index][field] = value;
        setCancerLines(updated);
    };
    
    return e('div', {className: 'fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center z-50 pt-24 pb-8 px-4 overflow-y-auto'},
        e('div', {className: 'bg-white rounded-2xl shadow-2xl p-6 w-full max-w-4xl max-h-[calc(100vh-8rem)] overflow-y-auto'},
            e('div', {className: 'flex justify-between items-center mb-6'},
                e('h3', {className: 'text-2xl font-bold text-slate-800'}, isEdit ? '編輯試驗' : '新增試驗'),
                e('button', {
                    onClick: props.onClose,
                    className: 'text-gray-500 hover:text-gray-700 text-3xl font-bold leading-none'
                }, '×')
            ),
            e('form', {onSubmit: handleSubmit, className: 'space-y-5'},
                e('div', {className: 'grid grid-cols-2 gap-4'},
                    e('div', null,
                        e('label', {className: 'block text-sm font-semibold text-slate-700 mb-1'}, '試驗代碼 *'),
                        e('input', {
                            type: 'text',
                            required: true,
                            value: form.code,
                            onChange: (ev) => update('code', ev.target.value),
                            className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none'
                        })
                    ),
                    e('div', null,
                        e('label', {className: 'block text-sm font-semibold text-slate-700 mb-1'}, '試驗期別'),
                        e('input', {
                            type: 'text',
                            value: form.phase,
                            onChange: (ev) => update('phase', ev.target.value),
                            placeholder: '例：III',
                            className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none'
                        })
                    )
                ),
                e('div', null,
                    e('label', {className: 'block text-sm font-semibold text-slate-700 mb-1'}, '試驗標題 *'),
                    e('textarea', {
                        required: true,
                        value: form.studyTitle,
                        onChange: (ev) => update('studyTitle', ev.target.value),
                        rows: 2,
                        className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none'
                    })
                ),
                e('div', {className: 'border-t-2 border-slate-200 pt-4'},
                    e('div', {className: 'flex justify-between items-center mb-3'},
                        e('label', {className: 'text-sm font-semibold text-slate-700'}, '癌症類型與治療線 *'),
                        e('button', {
                            type: 'button',
                            onClick: addCancerLine,
                            className: 'px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition-colors'
                        }, '+ 添加')
                    ),
                    e('div', {className: 'space-y-2'},
                        cancerLines.map((cl, idx) =>
                            e('div', {key: idx, className: 'flex gap-2 items-start'},

                                        type: 'text',

function ImportStatusModal(props) {
    const [csvText, setCsvText] = useState('');
    const [previewCount, setPreviewCount] = useState(0);
    const [fileName, setFileName] = useState('');
    const [parsedRows, setParsedRows] = useState([]);
    const [importInfo, setImportInfo] = useState(null);
    const [busy, setBusy] = useState(false);

    const handlePreview = () => {
        const parsed = parsedRows.length ? parsedRows : parseStudyStatusCsv(csvText);
        const info = analyzeParsedTrials(parsed);
        setParsedRows(info.rows);
        setImportInfo(info);
        setPreviewCount(info.uniqueCount);
    };

    const handleFile = async (ev) => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;

        setBusy(true);
        setFileName(file.name);

        try {
            if (file.name.match(/\.(xlsx|xls)$/i)) {
                const result = await parseExcelFile(file);
                setCsvText(result.text);
                const parsed = result.parsed && result.parsed.length ? result.parsed : parseStudyStatusCsv(result.text);
                const info = analyzeParsedTrials(parsed);
                setParsedRows(info.rows);
                setImportInfo(info);
                setPreviewCount(info.uniqueCount);
                alert(`Excel讀取成功：有效 ${info.validCount} 筆，合併重複 ${info.duplicateCount} 筆，將匯入 ${info.uniqueCount} 筆`);
            } else {
                const text = await file.text();
                setCsvText(text);
                const parsed = parseStudyStatusCsv(text);
                const info = analyzeParsedTrials(parsed);
                setParsedRows(info.rows);
                setImportInfo(info);
                setPreviewCount(info.uniqueCount);
                alert(`CSV讀取成功：有效 ${info.validCount} 筆，合併重複 ${info.duplicateCount} 筆，將匯入 ${info.uniqueCount} 筆`);
            }
        } catch (e) {
            console.error(e);
            alert('檔案讀取失敗');
        } finally {
            setBusy(false);
        }
    };

    const handleImport = async () => {
        const raw = parsedRows.length ? parsedRows : parseStudyStatusCsv(csvText);
        const info = analyzeParsedTrials(raw);
        const parsed = info.rows;
        setImportInfo(info);
        setPreviewCount(info.uniqueCount);
        if (!parsed.length) {
            alert('沒有讀到任何有效資料，請確認 CSV / Excel 內容與欄位名稱。');
            return;
        }
        await props.onImport(parsed);
    };

    return e('div', {className: 'fixed inset-0 bg-black bg-opacity-50 flex items-start justify-center z-50 pt-24 pb-8 px-4 overflow-y-auto'},
        e('div', {className: 'bg-white rounded-2xl shadow-2xl p-6 w-full max-w-5xl max-h-[calc(100vh-8rem)] overflow-y-auto'},
            e('div', {className: 'flex justify-between items-center mb-4'},
                e('h3', {className: 'text-2xl font-bold text-slate-800'}, '匯入 Study Status'),
                e('button', {
                    onClick: props.onClose,
                    className: 'text-gray-500 hover:text-gray-700 text-3xl font-bold leading-none'
                }, '×')
            ),
            e('div', {className: 'mb-4 p-3 bg-amber-50 rounded-lg text-sm text-amber-800'},
                '可直接上傳 Excel / CSV，或貼上 Excel 複製內容。欄位順序可亂、標題可用常見別名；系統會自動辨識並用 code 當唯一鍵 upsert。'
            ),
            e('div', {className: 'mb-4 p-4 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50'},
                e('div', {className: 'font-semibold mb-2 text-slate-800'}, '上傳檔案'),
                e('input', {
                    type: 'file',
                    accept: '.xlsx,.xls,.csv,text/csv',
                    onChange: handleFile,
                    className: 'block w-full text-sm'
                }),
                fileName && e('div', {className: 'text-xs text-slate-500 mt-2'}, `已選擇：${fileName}`),
                busy && e('div', {className: 'text-xs text-blue-600 mt-2'}, '讀取中...')
            ),
            e('div', {className: 'mb-3 p-3 bg-slate-50 rounded-lg text-xs text-slate-700 whitespace-pre-wrap'},
                '核心欄位至少需能辨識 code。其餘欄位可自由丟：studyTitle / sponsor / phase / targetNum / enrolled / pi / nurse / phone / status / comments 等。'
            ),
            e('textarea', {
                value: csvText,
                onChange: (ev) => { setCsvText(ev.target.value); setParsedRows([]); setImportInfo(null); },
                rows: 14,
                placeholder: '可直接貼上 Excel 內容或 CSV 內容…',
                className: 'w-full px-3 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none font-mono text-sm'
            }),
            e('div', {className: 'mt-4 flex flex-wrap gap-3 items-center'},
                e('button', {
                    type: 'button',
                    onClick: handlePreview,
                    className: 'px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700'
                }, '預覽筆數'),
                e('div', {className: 'text-sm text-slate-700'},
                    previewCount ? `已解析 ${previewCount} 筆` : '尚未預覽'
                ),
                importInfo && e('div', {className: 'text-sm text-amber-700'}, `有效 ${importInfo.validCount} 筆；重複 code 已合併 ${importInfo.duplicateCount} 筆；實際匯入 ${importInfo.uniqueCount} 筆`),
                e('button', {
                    type: 'button',
                    onClick: handleImport,
                    className: 'ml-auto px-5 py-2 bg-gradient-to-r from-emerald-500 to-green-600 text-white rounded-lg hover:from-emerald-600 hover:to-green-700 font-semibold'
                }, '匯入並自動合併更新')
            )
        )
    );
}

function App() {
    const [isAuth, setIsAuth] = useState(false);
    const [isAdmin, setIsAdmin] = useState(false);
    const [trials, setTrials] = useState([]);
    const [subjects, setSubjects] = useState([]);
    const [search, setSearch] = useState('');
    const [cancerType, setCancerType] = useState('全部');
    const [selectedLine, setSelectedLine] = useState('全部');
    const [loading, setLoading] = useState(true);
    const [selectedTrial, setSelectedTrial] = useState(null);
    const [showSubjects, setShowSubjects] = useState(false);
    const [showAddModal, setShowAddModal] = useState(false);
    const [showEditModal, setShowEditModal] = useState(null);
    const [showImportModal, setShowImportModal] = useState(false);
    const [syncStatus, setSyncStatus] = useState('');
    const [showArchived, setShowArchived] = useState(false);
    const [firebaseConfig, setFirebaseConfig] = useState(DEFAULT_FIREBASE_CONFIG);
    const [firebaseEnabled, setFirebaseEnabled] = useState(true);
    const [showFirebaseModal, setShowFirebaseModal] = useState(false);
    const unsubscribeRef = useRef(null);
    
    useEffect(() => {
        try {
            const stored = localStorage.getItem('clinical-trials-encrypted');
            const storedSubjects = localStorage.getItem('clinical-trials-subjects');
            const localTrials = stored ? decryptData(stored) : null;
            const localSubjects = storedSubjects ? decryptData(storedSubjects) : null;

            setTrials(Array.isArray(localTrials) && localTrials.length > 0 ? localTrials : INITIAL_TRIALS);
            setSubjects(Array.isArray(localSubjects) ? localSubjects : []);
            setLoading(false);
            setSyncStatus(Array.isArray(localTrials) && localTrials.length > 0
                ? `本機快取已載入（${localTrials.length} 個試驗），正在連線雲端...`
                : `本機初始資料（${INITIAL_TRIALS.length} 個試驗），正在連線雲端...`);
        } catch (error) {
            console.error('Local load error:', error);
            setTrials(INITIAL_TRIALS);
            setSubjects([]);
            setLoading(false);
            setSyncStatus('本機資料模式');
        }
    }, []);

    useEffect(() => {
        if (unsubscribeRef.current) {
            try { unsubscribeRef.current(); } catch (e) {}
            unsubscribeRef.current = null;
        }
        if (!firebaseEnabled || !firebaseConfig) return;
        setSyncStatus('Firebase 連線中...');
        unsubscribeRef.current = subscribeFirestoreData({
            firebaseConfig,
            onTrials: async (remoteTrials) => {
                setTrials(remoteTrials);
                await saveAllData(remoteTrials, subjects);
            },
            onSubjects: async (remoteSubjects) => {
                setSubjects(remoteSubjects);
                await saveAllData(trials, remoteSubjects);
            },
            onStatus: (msg) => setSyncStatus(msg),
            onError: (error) => {
                console.error('Firebase subscribe error:', error);
                setSyncStatus(`Firebase 同步失敗：${error.message || error}`);
            }
        });
        seedInitialTrialsToFirestore(firebaseConfig, INITIAL_TRIALS)
            .then((seeded) => {
                if (seeded) setSyncStatus(`已初始化雲端主資料（${INITIAL_TRIALS.length} 個試驗）`);
            })
            .catch((error) => console.error('Seed failed', error));
        return () => {
            if (unsubscribeRef.current) {
                try { unsubscribeRef.current(); } catch (e) {}
                unsubscribeRef.current = null;
            }
        };
    }, [firebaseEnabled, firebaseConfig]);
    
    const saveTrials = async (data) => {
        setTrials(data);
        await saveAllData(data, subjects);
        setSyncStatus(firebaseEnabled ? `已更新本機快取，等待 Firebase 同步（${data.length} 個試驗）` : `已儲存到本機資料（${data.length} 個試驗）`);
    };

    const handleSaveTrial = async (trialData) => {
        const prepared = cleanTrialForSave({
            ...trialData,
            updatedBy: isAdmin ? CONFIG.ADMIN_USERNAME : 'user'
        });
        const existing = trials.find(t => normalizeCode(t.code) === normalizeCode(prepared.code));
        let updatedTrials = upsertTrialsByCode(trials, [prepared]);
        setTrials(updatedTrials);
        await saveAllData(updatedTrials, subjects);
        if (firebaseEnabled && firebaseConfig) {
            await saveTrialToFirestore(firebaseConfig, prepared);
            setSyncStatus(`已同步到 Firebase：${prepared.code}`);
        } else {
            setSyncStatus(`已儲存到本機資料：${prepared.code}`);
        }
        setShowAddModal(false);
        setShowEditModal(null);
        alert(existing ? '試驗已更新！' : '試驗已新增！');
    };

    const handleImportStudyStatus = async (incomingRows) => {
        const importAnalysis = analyzeParsedTrials(incomingRows);
        const uniqueRows = importAnalysis.rows;
        const merged = upsertTrialsByCode(trials, uniqueRows);
        setTrials(merged);
        await saveAllData(merged, subjects);
        let added = 0, updated = 0, skipped = 0;
        const existingMap = new Map((trials || []).map(t => [normalizeCode(t.code), t]));
        for (const row of uniqueRows) {
            const key = normalizeCode(row.code);
            if (!key) { skipped++; continue; }
            if (existingMap.has(key)) updated++; else added++;
            if (firebaseEnabled && firebaseConfig) {
                await saveTrialToFirestore(firebaseConfig, { ...existingMap.get(key), ...row });
            }
        }
        const msg = `已匯入：新增 ${added} / 更新 ${updated} / 跳過 ${skipped}；重複 code 已合併 ${importAnalysis.duplicateCount} 筆`;
        setSyncStatus(firebaseEnabled ? `Firebase ${msg}` : `本機 ${msg}`);
        setShowImportModal(false);
        alert(`已完成匯入：新增 ${added} 筆、更新 ${updated} 筆、跳過 ${skipped} 筆。重複 code 已合併 ${importAnalysis.duplicateCount} 筆。`);
    };


    const handleExportJSON = () => {
        try {
            const data = { trials: trials || [], subjects: subjects || [], updatedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `clinicaltrial_export_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        } catch (error) {
            console.error(error);
            alert('匯出 JSON 失敗');
        }
    };

    const handleImportJSON = async (ev) => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            if (!Array.isArray(data.trials)) {
                alert('JSON 格式不正確，缺少 trials 陣列');
                return;
            }
            const mergedTrials = upsertTrialsByCode(trials, data.trials);
            const mergedSubjects = Array.isArray(data.subjects) ? data.subjects : subjects;
            setTrials(mergedTrials);
            setSubjects(mergedSubjects);
            await saveAllData(mergedTrials, mergedSubjects);
            if (firebaseEnabled && firebaseConfig) {
                for (const trial of data.trials) {
                    await saveTrialToFirestore(firebaseConfig, trial);
                }
                await saveSubjectsToFirestore(firebaseConfig, mergedSubjects);
            }
            setSyncStatus(`已匯入 JSON 並自動合併（${data.trials.length} 個試驗）`);
            alert('匯入 JSON 完成');
        } catch (error) {
            console.error(error);
            alert('匯入 JSON 失敗');
        } finally {
            ev.target.value = '';
        }
    };

    const downloadCSV = () => {
        const headers = ['試驗代碼', '試驗標題', '癌症類型與治療線', '期別', 'PI', '護理師', '電話', '狀態', '收案進度'];
        const rows = filtered.map(trial => {

                <table>
                  <thead>
                    <tr>
                      <th>代碼</th>
                      <th>試驗標題</th>
                      <th>癌症類型與治療線</th>
                      <th>期別</th>
                      <th>PI</th>
                      <th>護理師</th>
                      <th>電話</th>
                      <th>狀態</th>
                      <th>收案進度</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${filtered.map(trial => {
                        const cancerInfo = trial.cancerTypes ? trial.cancerTypes.map(ct => 
                            `${ct.type}: ${ct.lines ? ct.lines.join(', ') : ''}`
                        ).join('<br>') : '';
                        
                        const statusClass = trial.status === '進行中' ? 'status-active' :

    };
    
    const handleDelete = async (id) => {
        if (confirm('確定要刪除此試驗？')) {
            const target = trials.find(t => t.id === id);
            const updated = trials.filter(t => t.id !== id);
            setTrials(updated);
            await saveAllData(updated, subjects);
            if (firebaseEnabled && firebaseConfig && target && target.code) {
                await deleteTrialFromFirestore(firebaseConfig, target.code);
                setSyncStatus(`已自 Firebase 刪除：${target.code}`);
            } else {
                await saveTrials(updated);
            }
        }
    };
    
    const handleManageSubjects = (trial) => {
        setSelectedTrial(trial);
        setShowSubjects(true);
    };
    
    const handleAddSubject = async (trialId, data) => {
        const newSubject = {
            ...data,
            id: Date.now(),
            trialIds: [trialId],
            createdAt: new Date().toISOString()
        };
        const updated = [...subjects, newSubject];
        await saveSubjects(updated);
    };
    
    const filtered = useMemo(() => {
        let result = trials;
        if (!showArchived) {
            result = result.filter(t => !t.isArchived);
        }
        
        // 搜尋篩選
        if (search) {
            const q = search.toLowerCase().trim();
            const normalize = (v) => String(v || '').toLowerCase().replace(/[\s　]+/g, ' ').trim();
            const haystack = (t) => [
                t.studyTitle,
                t.code,
                t.sponsor,
                t.pi,
                t.nurse,
                t.phone,
                Array.isArray(t.cancerTypes) ? t.cancerTypes.map(ct => `${ct.type || ''} ${(ct.lines || []).join(' ')}`).join(' ') : '',
                t.comments
            ].map(normalize).join(' | ');
            result = result.filter(t => haystack(t).includes(q));
        }
        
        // 癌症類型篩選
        if (cancerType !== '全部') {
            result = result.filter(t => {
                const candidates = [];
                if (Array.isArray(t.cancerTypes)) t.cancerTypes.forEach(ct => candidates.push(ct.type));
                if (t.cancerType) candidates.push(t.cancerType);
                return candidates.some(type => valueMatches(type, cancerType));
            });
        }
        
        // 治療線篩選：會先正規化空白/換行/斜線，所以「一\n線」「二、三線」也能正確命中
        if (selectedLine !== '全部') {
            result = result.filter(t => {
                const lineCandidates = [];
                if (Array.isArray(t.cancerTypes)) {
                    t.cancerTypes.forEach(ct => {
                        if (Array.isArray(ct.lines)) ct.lines.forEach(line => lineCandidates.push(line));
                    });
                }
                if (t.line) lineCandidates.push(t.line);
                return lineCandidates.some(line => lineMatchesSelection(line, selectedLine));
            });
        }
        
        return result;
    }, [trials, search, cancerType, selectedLine, showArchived]);
    
    const cancerTypes = useMemo(() => {
        const map = new Map();
        trials.forEach(trial => {
            const addType = (type) => {
                const label = normalizeText(type);
                if (!label) return;
                const key = normalizeFilterValue(label);
                if (!map.has(key)) map.set(key, label);
            };
            if (trial.cancerTypes && trial.cancerTypes.length > 0) {
                trial.cancerTypes.forEach(ct => addType(ct.type));
            }
            if (trial.cancerType) addType(trial.cancerType);
        });
        return ['全部', ...Array.from(map.values()).sort()];
    }, [trials]);
    
    const treatmentLines = useMemo(() => {
        return ['全部', '第一線', '第二線', '第三線', 'Adjuvant', '多線'];
    }, [trials]);
    
    const handleSaveFirebaseConfig = async (cfg) => {
        try {
            if (!cfg.apiKey || !cfg.projectId || !cfg.appId) {
                alert('請至少填 apiKey / projectId / appId');
                return;
            }
            initializeFirebaseApp(cfg);
            setStoredFirebaseConfig(cfg);
            setFirebaseConfig(cfg);
            setFirebaseEnabled(true);
            setShowFirebaseModal(false);
            setSyncStatus('Firebase 已啟用，正在同步...');
        } catch (error) {
            console.error(error);
            alert(`Firebase 設定失敗：${error.message || error}`);
        }
    };

    const handleDisableFirebase = () => {
        localStorage.removeItem(CONFIG.FIREBASE_ENABLED_KEY);
        setFirebaseEnabled(false);
        setShowFirebaseModal(false);
        setSyncStatus('已切回本機模式');
    };
    
    if (!isAuth) {
        return e(AccessPasswordModal, {onAuth: handleAuth});
    }
    
    if (loading) {
        return e('div', {className: 'min-h-screen flex items-center justify-center'},
            e('div', {className: 'text-xl'}, '載入中...')
        );
    }
    
    return e('div', {className: 'min-h-screen'},
        e('div', {className: 'bg-white shadow-lg mt-16 sticky top-0 z-50'},
            e('div', {className: 'max-w-7xl mx-auto px-4 py-4'},
                e('div', {className: 'flex items-center justify-between'},
                    e('h1', {className: 'text-2xl font-bold text-slate-800'}, '臨床試驗管理系統 v4.0.4 Firebase版'),
                    e('button', {
                        onClick: isAdmin ? () => setIsAdmin(false) : handleLogin,
                        className: 'px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700'
                    }, isAdmin ? '登出' : '管理員登入')
                )
            )
        ),
        e('div', {className: 'max-w-7xl mx-auto px-4 py-8'},
            e('div', {className: 'flex gap-3 mb-6'},
                isAdmin && e('button', {
                    onClick: () => setShowAddModal(true),
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 4v16m8-8H4'})
                    ),
                    '新增試驗'
                ),
                isAdmin && e('button', {
                    onClick: () => setShowImportModal(true),
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white rounded-xl hover:from-violet-600 hover:to-fuchsia-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V3m0 9l-3-3m3 3l3-3'})
                    ),
                    '匯入資料'
                ),
                isAdmin && e('button', {
                    onClick: handleExportJSON,
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-xl hover:from-amber-600 hover:to-orange-600 transition-all shadow-lg font-semibold'
                }, '匯出 JSON'),
                isAdmin && e('label', {
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-teal-500 to-emerald-500 text-white rounded-xl hover:from-teal-600 hover:to-emerald-600 transition-all shadow-lg font-semibold cursor-pointer'
                },
                    '匯入 JSON',
                    e('input', {
                        type: 'file',
                        accept: '.json,application/json',
                        onChange: handleImportJSON,
                        className: 'hidden'
                    })
                ),
                isAdmin && e('button', {
                    onClick: () => setShowFirebaseModal(true),
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-sky-500 to-cyan-500 text-white rounded-xl hover:from-sky-600 hover:to-cyan-600 transition-all shadow-lg font-semibold'
                }, firebaseEnabled ? '雲端同步（已啟用）' : '雲端同步'),
                e('button', {
                    onClick: downloadCSV,
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4'})
                    ),
                    '下載 Excel'
                ),
                e('button', {
                    onClick: generatePDF,
                    className: 'flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-red-500 to-rose-500 text-white rounded-xl hover:from-red-600 hover:to-rose-600 transition-all shadow-lg font-semibold'
                },
                    e('svg', {className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'},
                        e('path', {strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'})
                    ),
                    '匯出 PDF'
                )
            ),
            syncStatus && e('div', {className: 'mb-4 text-sm text-slate-600'}, syncStatus),
            e('div', {className: 'mb-4 flex items-center gap-3 text-sm text-slate-700'},
                e('label', {className: 'flex items-center gap-2 cursor-pointer'},
                    e('input', {
                        type: 'checkbox',
                        checked: showArchived,
                        onChange: (ev) => setShowArchived(ev.target.checked),
                        className: 'w-4 h-4'
                    }),
                    e('span', null, '顯示已封存試驗')
                )
            ),
            e('div', {className: 'mb-6 space-y-4'},
                e('input', {
                    type: 'text',
                    value: search,
                    onChange: (ev) => setSearch(ev.target.value),
                    placeholder: '搜尋試驗代碼、標題、PI...',
                    className: 'w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500'
                }),
                e('div', {className: 'grid grid-cols-2 gap-4'},
                    e('select', {
                        value: cancerType,
                        onChange: (ev) => setCancerType(ev.target.value),
                        className: 'w-full px-4 py-2 border rounded-lg'
                    }, cancerTypes.map(type =>
                        e('option', {key: type, value: type}, type)
                    )),
                    e('select', {
                        value: selectedLine,
                        onChange: (ev) => setSelectedLine(ev.target.value),
                        className: 'w-full px-4 py-2 border rounded-lg'
                    }, treatmentLines.map(line =>
                        e('option', {key: line, value: line}, line)
                    ))
                )
            ),
            e('div', {className: 'text-gray-600 mb-4'},
                '找到 ' + filtered.length + ' 個試驗'
            ),
            e('div', {className: 'grid gap-6'},
                filtered.map(trial =>
                    e(TrialCard, {
                        key: normalizeCode(trial.code) || trial.id,
                        trial: trial,
                        isLoggedIn: isAdmin,
                        onEdit: handleEdit,
                        onDelete: handleDelete,
                        onManageSubjects: handleManageSubjects
                    })
                )
            )
        ),
        showSubjects && selectedTrial && e(SubjectsListModal, {
            trial: selectedTrial,
            subjects: subjects,
            onClose: () => {
                setShowSubjects(false);
                setSelectedTrial(null);
            },
            onAddSubject: handleAddSubject
        }),
            showAddModal && e(TrialFormModal, {
                onSave: handleSaveTrial,
                onClose: () => setShowAddModal(false)
            }),
            showEditModal && e(TrialFormModal, {
                trial: showEditModal,
                onSave: handleSaveTrial,
                onClose: () => setShowEditModal(null)
            }),
            showImportModal && e(ImportStatusModal, {
                onImport: handleImportStudyStatus,
                onClose: () => setShowImportModal(false)
            }),
            showFirebaseModal && e(FirebaseConfigModal, {
                initialConfig: firebaseConfig || {},
                onClose: () => setShowFirebaseModal(false),
                onSave: handleSaveFirebaseConfig,
                onDisable: handleDisableFirebase
            })
    );
}

ReactDOM.render(e(App), document.getElementById('app'));
    </script>
</body>
</html>
