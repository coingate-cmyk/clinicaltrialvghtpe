<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨床試驗管理系統 v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50">
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        // 不用 Babel！直接用 JavaScript！
        const { useState, useEffect } = React;
        const e = React.createElement;

        // 安全配置
        const SECURITY_CONFIG = {
            ACCESS_PASSWORD: 'clinical2026',
            ADMIN_USERNAME: 'admin',
            ADMIN_PASSWORD: 'admin123',
            ENCRYPTION_KEY: 'clinical-trials-secret-key-2026'
        };

        // 加密解密
        const encryptData = (data) => {
            try {
                return CryptoJS.AES.encrypt(JSON.stringify(data), SECURITY_CONFIG.ENCRYPTION_KEY).toString();
            } catch (error) {
                console.error('加密失敗:', error);
                return null;
            }
        };

        const decryptData = (encryptedData) => {
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedData, SECURITY_CONFIG.ENCRYPTION_KEY);
                const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                return JSON.parse(decryptedString);
            } catch (error) {
                console.error('解密失敗:', error);
                return null;
            }
        };

        // 簡單的測試組件
        function TestApp() {
            const [password, setPassword] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            const handleSubmit = (event) => {
                event.preventDefault();
                if (password === SECURITY_CONFIG.ACCESS_PASSWORD) {
                    setIsAuthenticated(true);
                } else {
                    alert('密碼錯誤！');
                }
            };

            if (!isAuthenticated) {
                return e('div', { 
                    className: 'min-h-screen flex items-center justify-center'
                },
                    e('div', { 
                        className: 'bg-white rounded-2xl shadow-2xl p-8 w-96'
                    },
                        e('h2', { 
                            className: 'text-2xl font-bold text-center mb-6'
                        }, '臨床試驗管理系統'),
                        e('form', { onSubmit: handleSubmit },
                            e('input', {
                                type: 'password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                placeholder: '請輸入密碼',
                                className: 'w-full px-4 py-2 border rounded-lg mb-4'
                            }),
                            e('button', {
                                type: 'submit',
                                className: 'w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700'
                            }, '進入系統')
                        )
                    )
                );
            }

            return e('div', { className: 'min-h-screen p-8' },
                e('div', { className: 'max-w-7xl mx-auto' },
                    e('h1', { 
                        className: 'text-3xl font-bold mb-8'
                    }, '✅ 系統運作正常！'),
                    e('div', { 
                        className: 'bg-white rounded-2xl shadow-lg p-6'
                    },
                        e('p', { className: 'text-lg mb-4' }, '這是純 JavaScript 版本（不用 JSX）'),
                        e('p', { className: 'text-gray-600' }, '確認可以運行後，我會添加完整功能。'),
                        e('button', {
                            onClick: () => setIsAuthenticated(false),
                            className: 'mt-4 px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600'
                        }, '登出測試')
                    )
                )
            );
        }

        ReactDOM.render(e(TestApp), document.getElementById('app'));
    </script>
</body>
</html>
