        // 試驗表單Modal（新增/編輯試驗）
        function TrialFormModal({ trial, onClose, onSave, allCancerTypes }) {
            const [formData, setFormData] = useState({
                studyTitle: '',
                code: '',
                phase: '',
                sponsor: '',
                targetNum: 0,
                enrolled: 0,
                monthSigned: 0,
                monthEnrolled: 0,
                pi: '',
                nurse: '',
                phone: '',
                status: '進行中',
                inclusion: '',
                exclusion: '',
                cancerTypes: [],
                ...trial
            });

            const [selectedCancerType, setSelectedCancerType] = useState('');
            const [selectedLines, setSelectedLines] = useState([]);

            const handleAddCancerType = () => {
                if (selectedCancerType && selectedLines.length > 0) {
                    const newCancerType = {
                        type: selectedCancerType,
                        lines: selectedLines
                    };
                    setFormData(prev => ({
                        ...prev,
                        cancerTypes: [...prev.cancerTypes, newCancerType]
                    }));
                    setSelectedCancerType('');
                    setSelectedLines([]);
                }
            };

            const handleRemoveCancerType = (index) => {
                setFormData(prev => ({
                    ...prev,
                    cancerTypes: prev.cancerTypes.filter((_, i) => i !== index)
                }));
            };

            const toggleLine = (line) => {
                setSelectedLines(prev =>
                    prev.includes(line)
                        ? prev.filter(l => l !== line)
                        : [...prev, line]
                );
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (formData.cancerTypes.length === 0) {
                    alert('請至少選擇一個癌種和治療線');
                    return;
                }
                onSave(formData);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 overflow-y-auto">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-4xl my-8">

                                                                type="button"
                                                                onClick={() => handleRemoveCancerType(idx)}

                                                                <XIcon />
                                                            </button>
                                                        </span>
                                                    ))}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* 新增癌種 */}

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

        function SubjectsManagementModal({ trial, onClose, onAddSubject, onUpdateSubject, onDeleteSubject }) {
            const [subjects, setSubjects] = useState(trial.subjects || []);
            const [editingSubject, setEditingSubject] = useState(null);
            const [showAddForm, setShowAddForm] = useState(false);
            const [selectedSubjects, setSelectedSubjects] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('全部');
            const [filterEligibility, setFilterEligibility] = useState('全部');

            useEffect(() => {
                setSubjects(trial.subjects || []);
            }, [trial]);

            const filteredSubjects = useMemo(() => {
                return subjects.filter(s => {
                    if (searchTerm && !s.name.includes(searchTerm) && !s.chartNo.includes(searchTerm)) {
                        return false;
                    }
                    if (filterStatus !== '全部' && s.status !== filterStatus) {
                        return false;
                    }
                    if (filterEligibility === '符合' && !s.eligibility) {
                        return false;
                    }
                    if (filterEligibility === '不符合' && s.eligibility) {
                        return false;
                    }
                    return true;
                });
            }, [subjects, searchTerm, filterStatus, filterEligibility]);

            const handleSaveSubject = (subjectData) => {
                if (editingSubject) {
                    onUpdateSubject(trial.id, editingSubject.id, subjectData);
                    setEditingSubject(null);
                } else {
                    onAddSubject(trial.id, subjectData);
                    setShowAddForm(false);
                }
            };

            const handleDeleteSelected = () => {
                if (confirm(`確定要刪除選中的 ${selectedSubjects.length} 位受試者？`)) {
                    selectedSubjects.forEach(id => {
                        onDeleteSubject(trial.id, id);
                    });
                    setSelectedSubjects([]);
                }
            };

            const toggleSelectSubject = (id) => {
                setSelectedSubjects(prev =>
                    prev.includes(id) ? prev.filter(sid => sid !== id) : [...prev, id]

                                                                    {subject.status}

                                                            </div>

                                                    <button

        // 設定頁面
        function SettingsView({ customCancerTypes, onSaveCancerTypes }) {
            const [newCancerType, setNewCancerType] = useState('');
            const [types, setTypes] = useState(customCancerTypes);

            const handleAdd = () => {
                if (newCancerType.trim() && !DEFAULT_CANCER_TYPES.includes(newCancerType) && !types.includes(newCancerType)) {
                    const updated = [...types, newCancerType.trim()];
                    setTypes(updated);
                    onSaveCancerTypes(updated);
                    setNewCancerType('');
                }
            };

            const handleDelete = (type) => {
                if (confirm(`確定要刪除「${type}」？`)) {
                    const updated = types.filter(t => t !== type);
                    setTypes(updated);
                    onSaveCancerTypes(updated);
                }
            };

            return (
                <div className="max-w-4xl mx-auto">

                                    />

                                        onClick={handleAdd}
                                        className="px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600"
                                    >
                                        <PlusIcon /> 新增
                                    </button>
                                </div>
                            </div>

                            {types.length > 0 && (
                                <div>
                                    <h4 className="font-semibold mb-3">自訂癌症種類</h4>
                                    <div className="space-y-2">
                                        {types.map(type => (
                                            <div key={type} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                                <span className="font-medium">{type}</span>
                                                <button
                                                    onClick={() => handleDelete(type)}
                                                    className="p-2 text-red-600 hover:bg-red-50 rounded-lg"
                                                >
                                                    <TrashIcon />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {types.length === 0 && (
                                <div className="text-center py-6 text-gray-500">
                                    尚無自訂癌症種類
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== 組件結束 ====================

        // 主應用程式組件（開始）
        function ClinicalTrialsApp() {
            // 狀態管理
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [trials, setTrials] = useState([]);
            const [filteredTrials, setFilteredTrials] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCancerType, setSelectedCancerType] = useState('全部');
            const [selectedLine, setSelectedLine] = useState('全部');
            const [selectedStatus, setSelectedStatus] = useState('全部');
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingTrial, setEditingTrial] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('trials'); // trials, subjects, settings
            const [selectedTrial, setSelectedTrial] = useState(null);
            const [subjects, setSubjects] = useState([]);
            const [customCancerTypes, setCustomCancerTypes] = useState([]);

            // 載入數據
            useEffect(() => {
                loadTrialsFromStorage();
                loadCustomCancerTypes();
            }, []);

            const loadTrialsFromStorage = () => {
                try {
                    const storedData = localStorage.getItem('clinical-trials-encrypted');
                    if (storedData) {
                        const decryptedTrials = decryptData(storedData);
                        if (decryptedTrials && Array.isArray(decryptedTrials)) {
                            setTrials(decryptedTrials);
                            setFilteredTrials(decryptedTrials);
                        } else {
                            setTrials(initialTrials);
                            setFilteredTrials(initialTrials);
                            saveTrialsToStorage(initialTrials);
                        }
                    } else {
                        setTrials(initialTrials);
                        setFilteredTrials(initialTrials);
                        saveTrialsToStorage(initialTrials);
                    }
                } catch (error) {
                    console.error('載入失敗:', error);
                    setTrials(initialTrials);
                    setFilteredTrials(initialTrials);
                } finally {
                    setLoading(false);
                }
            };

            const saveTrialsToStorage = (trialsData) => {
                try {
                    const encrypted = encryptData(trialsData);
                    if (encrypted) {
                        localStorage.setItem('clinical-trials-encrypted', encrypted);
                    }
                } catch (error) {
                    console.error('儲存失敗:', error);
                }
            };

            const loadCustomCancerTypes = () => {
                try {
                    const stored = localStorage.getItem('custom-cancer-types');
                    if (stored) {
                        setCustomCancerTypes(JSON.parse(stored));
                    }
                } catch (error) {
                    console.error('載入自訂癌種失敗:', error);
                }
            };

            const saveCustomCancerTypes = (types) => {
                try {
                    localStorage.setItem('custom-cancer-types', JSON.stringify(types));
                    setCustomCancerTypes(types);
                } catch (error) {
                    console.error('儲存自訂癌種失敗:', error);
                }
            };

            // 獲取所有可用的癌症種類
            const allCancerTypes = useMemo(() => {
                return [...DEFAULT_CANCER_TYPES, ...customCancerTypes].sort();
            }, [customCancerTypes]);

            // 篩選邏輯
            useEffect(() => {
                let filtered = trials;

                if (searchTerm) {
                    filtered = filtered.filter(t =>
                        t.studyTitle.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        t.code.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        t.sponsor.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        t.pi.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        t.nurse.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }

                if (selectedCancerType !== '全部') {
                    filtered = filtered.filter(t =>
                        t.cancerTypes && t.cancerTypes.some(ct => ct.type === selectedCancerType)
                    );
                }

                if (selectedLine !== '全部') {
                    filtered = filtered.filter(t =>
                        t.cancerTypes && t.cancerTypes.some(ct =>
                            ct.lines && ct.lines.some(line => line.includes(selectedLine))
                        )
                    );
                }

                if (selectedStatus !== '全部') {
                    filtered = filtered.filter(t => t.status === selectedStatus);
                }

                setFilteredTrials(filtered);
            }, [searchTerm, selectedCancerType, selectedLine, selectedStatus, trials]);

            // 受試者相關函數
            const addSubject = (trialId, subjectData) => {
                const updatedTrials = trials.map(t => {
                    if (t.id === trialId) {
                        const newSubject = {
                            ...subjectData,
                            id: Date.now(),
                            trialId: trialId,
                            registeredDate: new Date().toISOString().split('T')[0],
                            registeredBy: 'admin'
                        };
                        return {
                            ...t,
                            subjects: [...(t.subjects || []), newSubject]
                        };
                    }
                    return t;
                });
                setTrials(updatedTrials);
                saveTrialsToStorage(updatedTrials);
            };

            const updateSubject = (trialId, subjectId, subjectData) => {
                const updatedTrials = trials.map(t => {
                    if (t.id === trialId) {
                        return {
                            ...t,
                            subjects: t.subjects.map(s =>
                                s.id === subjectId ? { ...s, ...subjectData } : s
                            )
                        };
                    }
                    return t;
                });
                setTrials(updatedTrials);
                saveTrialsToStorage(updatedTrials);
            };

            const deleteSubject = (trialId, subjectId) => {
                const updatedTrials = trials.map(t => {
                    if (t.id === trialId) {
                        return {
                            ...t,
                            subjects: t.subjects.filter(s => s.id !== subjectId)
                        };
                    }
                    return t;
                });
                setTrials(updatedTrials);
                saveTrialsToStorage(updatedTrials);
            };

            // 試驗相關函數
            const addTrial = (trialData) => {
                const newTrial = {
                    ...trialData,
                    id: Math.max(...trials.map(t => t.id), 0) + 1,
                    subjects: []
                };
                const updatedTrials = [...trials, newTrial];
                setTrials(updatedTrials);
                saveTrialsToStorage(updatedTrials);
                setShowAddModal(false);
            };

            const updateTrial = (trialData) => {
                const updatedTrials = trials.map(t =>
                    t.id === trialData.id ? { ...t, ...trialData } : t
                );
                setTrials(updatedTrials);
                saveTrialsToStorage(updatedTrials);
                setEditingTrial(null);
            };

            const deleteTrial = (id) => {
                if (confirm('確定要刪除此試驗？此操作無法復原。')) {
                    const updatedTrials = trials.filter(t => t.id !== id);
                    setTrials(updatedTrials);
                    saveTrialsToStorage(updatedTrials);
                }
            };

            // 認證相關
            const handleAccessAuth = (password) => {
                if (password === SECURITY_CONFIG.ACCESS_PASSWORD) {
                    setIsAuthenticated(true);
                    return true;
                }
                return false;
            };

            const handleAdminLogin = (username, password) => {
                if (username === SECURITY_CONFIG.ADMIN_USERNAME &&
                    password === SECURITY_CONFIG.ADMIN_PASSWORD) {
                    setIsLoggedIn(true);
                    setShowLoginModal(false);
                    return true;
                }
                return false;
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
            };

            // 如果未認證，顯示密碼輸入頁面
            if (!isAuthenticated) {
                return <AccessPasswordModal onAuth={handleAccessAuth} />;
            }

            // 如果正在載入
            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto"></div>
                            <p className="mt-4 text-gray-600">載入中...</p>
                        </div>
                    </div>
                );
            }

            // 主界面
            return (
                <div className="min-h-screen pb-20">
                    {/* 頂部導航列 */}
                    <div className="bg-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-4">
                                    <div className="flex items-center">
                                        <ClipboardIcon />
                                        <h1 className="text-2xl font-bold text-slate-800 ml-2">
                                            臨床試驗管理系統
                                        </h1>
                                    </div>
                                    <span className="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-semibold">
                                        v3.0
                                    </span>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <button
                                        onClick={() => setCurrentView('trials')}
                                        className={`px-4 py-2 rounded-lg transition-all ${
                                            currentView === 'trials'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        <ClipboardIcon />
                                        <span className="ml-2">試驗列表</span>
                                    </button>
                                    <button
                                        onClick={() => setCurrentView('subjects')}
                                        className={`px-4 py-2 rounded-lg transition-all ${
                                            currentView === 'subjects'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        <UsersIcon />
                                        <span className="ml-2">受試者管理</span>
                                    </button>
                                    {isLoggedIn && (
                                        <>
                                            <button
                                                onClick={() => setCurrentView('settings')}
                                                className={`px-4 py-2 rounded-lg transition-all ${
                                                    currentView === 'settings'
                                                        ? 'bg-blue-600 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                                }`}
                                            >
                                                <SettingsIcon />
                                                <span className="ml-2">系統設定</span>
                                            </button>
                                            <button
                                                onClick={() => setShowAddModal(true)}
                                                className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-xl hover:from-green-600 hover:to-emerald-600 transition-all shadow-lg"
                                            >
                                                <PlusIcon />
                                                新增試驗
                                            </button>
                                            <button
                                                onClick={handleLogout}
                                                className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-rose-500 to-pink-500 text-white rounded-xl hover:from-rose-600 hover:to-pink-600 transition-all shadow-lg"
                                            >
                                                <LogoutIcon />
                                                登出
                                            </button>
                                        </>
                                    )}
                                    {!isLoggedIn && (
                                        <button
                                            onClick={() => setShowLoginModal(true)}
                                            className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all shadow-lg"
                                        >
                                            <LoginIcon />
                                            管理員登入
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 主內容區 */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {currentView === 'trials' && (
                            <TrialsView
                                trials={filteredTrials}
                                allTrials={trials}
                                searchTerm={searchTerm}
                                setSearchTerm={setSearchTerm}
                                selectedCancerType={selectedCancerType}
                                setSelectedCancerType={setSelectedCancerType}
                                selectedLine={selectedLine}
                                setSelectedLine={setSelectedLine}
                                selectedStatus={selectedStatus}
                                setSelectedStatus={setSelectedStatus}
                                isLoggedIn={isLoggedIn}
                                onEdit={setEditingTrial}
                                onDelete={deleteTrial}
                                onManageSubjects={setSelectedTrial}
                                allCancerTypes={allCancerTypes}
                            />
                        )}
                        {currentView === 'subjects' && (
                            <AllSubjectsView
                                trials={trials}
                                onEditSubject={updateSubject}
                                onDeleteSubject={deleteSubject}
                            />
                        )}
                        {currentView === 'settings' && isLoggedIn && (
                            <SettingsView
                                customCancerTypes={customCancerTypes}
                                onSaveCancerTypes={saveCustomCancerTypes}
                            />
                        )}
                    </div>

                    {/* 各種 Modal */}
                    {showLoginModal && (
                        <AdminLoginModal
                            onClose={() => setShowLoginModal(false)}
                            onLogin={handleAdminLogin}
                        />
                    )}
                    {showAddModal && (
                        <TrialFormModal
                            onClose={() => setShowAddModal(false)}
                            onSave={addTrial}
                            allCancerTypes={allCancerTypes}
                        />
                    )}
                    {editingTrial && (
                        <TrialFormModal
                            trial={editingTrial}
                            onClose={() => setEditingTrial(null)}
                            onSave={updateTrial}
                            allCancerTypes={allCancerTypes}
                        />
                    )}
                    {selectedTrial && (
                        <SubjectsManagementModal
                            trial={selectedTrial}
                            onClose={() => setSelectedTrial(null)}
                            onAddSubject={addSubject}
                            onUpdateSubject={updateSubject}
                            onDeleteSubject={deleteSubject}
                        />
                    )}
                </div>
            );
        }

        // 渲染應用
        ReactDOM.render(<ClinicalTrialsApp />, document.getElementById('app'));
    </script>
</body>
</html>
